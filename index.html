<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
    <!-- iOS: prevent auto-linking of PnL numbers/dates into blue telephone links inside tables. -->
    <meta name="format-detection" content="telephone=no, date=no, address=no, email=no" />
    <!-- Theme preboot — applies the FULL token map before first paint to prevent FOUC across midnight/blue/platinum. -->
    <script>
      (function () {
        try {
          // Derive the currently signed-in Supabase user id from localStorage so the
          // preboot can read the PER-USER theme cache (orca:<uid>:theme-cache).
          // Falls back to the legacy global cache, then graphite.
          var uid = null;
          try {
            for (var i = 0; i < localStorage.length; i++) {
              var k = localStorage.key(i);
              if (!k || k.indexOf('sb-') !== 0 || k.indexOf('-auth-token') === -1) continue;
              var raw = localStorage.getItem(k);
              if (!raw) continue;
              var parsed = null;
              try { parsed = JSON.parse(raw); } catch (_e) { parsed = null; }
              if (!parsed) continue;
              var u = (parsed.user && parsed.user.id)
                || (parsed.currentSession && parsed.currentSession.user && parsed.currentSession.user.id)
                || (Array.isArray(parsed) && parsed[0] && typeof parsed[0] === 'object' && parsed[0].user && parsed[0].user.id)
                || null;
              if (u) { uid = u; break; }
            }
          } catch (_e) { /* ignore */ }
          var readCache = function (key) {
            try {
              if (uid) {
                var v = localStorage.getItem('orca:' + uid + ':' + key);
                if (v !== null && v !== undefined) return v;
              }
              return localStorage.getItem('orca:' + key);
            } catch (_e) { return null; }
          };
          var t = readCache('theme-cache');
          if (t === 'indigo' || t === 'hightech' || t === 'institutional') t = 'blue';
          if (t === 'precision') t = 'graphite';
          if (t !== 'midnight' && t !== 'blue' && t !== 'platinum' && t !== 'graphite') t = 'blue';
          var SOLID = { midnight: '#020202', blue: '#0B1120', platinum: '#f4efe4', graphite: '#0e1013' };
          // Full token maps — MUST stay in sync with src/lib/trading-theme.ts cssVars.
          var TOKENS = {
            midnight: {
              '--background':'0 0% 0.8%','--foreground':'210 20% 96%',
              '--card':'0 0% 3.1%','--card-foreground':'210 20% 96%',
              '--popover':'0 0% 3.1%','--popover-foreground':'210 20% 96%',
              '--primary':'184 100% 50%','--primary-foreground':'0 0% 0%',
              '--secondary':'0 0% 6%','--secondary-foreground':'210 20% 96%',
              '--muted':'0 0% 9%','--muted-foreground':'215 12% 55%',
              '--accent':'184 100% 50%','--accent-foreground':'0 0% 0%',
              '--destructive':'0 100% 56%','--ring':'184 100% 50%',
              '--sidebar-background':'0 0% 2%','--sidebar-foreground':'215 12% 55%',
              '--sidebar-primary':'184 100% 50%','--sidebar-primary-foreground':'0 0% 0%',
              '--sidebar-accent':'0 0% 6%','--sidebar-accent-foreground':'210 20% 96%','--sidebar-ring':'184 100% 50%',
              '--orca-aurora-a':'184 100% 50%','--orca-aurora-b':'258 90% 66%',
              '--orca-glow-spot':'184 100% 50%','--orca-primary-h':'184 100% 50%'
            },
            blue: {
              '--background':'220 60% 8%','--foreground':'213 31% 94%',
              '--card':'220 45% 13%','--card-foreground':'213 31% 94%',
              '--popover':'220 45% 13%','--popover-foreground':'213 31% 94%',
              '--primary':'199 89% 60%','--primary-foreground':'220 60% 8%',
              '--secondary':'217 33% 17%','--secondary-foreground':'213 31% 94%',
              '--muted':'217 25% 20%','--muted-foreground':'215 20% 65%',
              '--accent':'199 89% 60%','--accent-foreground':'220 60% 8%',
              '--destructive':'0 84% 70%','--ring':'199 89% 60%',
              '--sidebar-background':'220 55% 10%','--sidebar-foreground':'215 20% 65%',
              '--sidebar-primary':'199 89% 60%','--sidebar-primary-foreground':'220 60% 8%',
              '--sidebar-accent':'217 33% 17%','--sidebar-accent-foreground':'213 31% 94%','--sidebar-ring':'199 89% 60%',
              '--orca-aurora-a':'199 89% 60%','--orca-aurora-b':'217 70% 55%',
              '--orca-glow-spot':'199 89% 70%','--orca-primary-h':'199 89% 60%'
            },
            platinum: {
              '--background':'40 30% 96%','--foreground':'222 47% 11%',
              '--card':'0 0% 100%','--card-foreground':'222 47% 11%',
              '--popover':'0 0% 100%','--popover-foreground':'222 47% 11%',
              '--primary':'224 76% 48%','--primary-foreground':'0 0% 100%',
              '--secondary':'40 25% 92%','--secondary-foreground':'222 47% 11%',
              '--muted':'40 20% 90%','--muted-foreground':'215 20% 35%',
              '--accent':'224 76% 48%','--accent-foreground':'0 0% 100%',
              '--destructive':'0 75% 42%','--ring':'224 76% 48%',
              '--sidebar-background':'40 30% 94%','--sidebar-foreground':'215 20% 35%',
              '--sidebar-primary':'224 76% 48%','--sidebar-primary-foreground':'0 0% 100%',
              '--sidebar-accent':'40 25% 92%','--sidebar-accent-foreground':'222 47% 11%','--sidebar-ring':'224 76% 48%',
              '--orca-aurora-a':'224 76% 60%','--orca-aurora-b':'38 80% 55%',
              '--orca-glow-spot':'224 76% 60%','--orca-primary-h':'224 76% 48%'
            },
            graphite: {
              '--background':'215 14% 7%','--foreground':'215 15% 92%',
              '--card':'215 14% 11%','--card-foreground':'215 15% 92%',
              '--popover':'215 14% 11%','--popover-foreground':'215 15% 92%',
              '--primary':'142 71% 45%','--primary-foreground':'0 0% 100%',
              '--secondary':'215 14% 14%','--secondary-foreground':'215 15% 92%',
              '--muted':'215 12% 16%','--muted-foreground':'215 10% 62%',
              '--accent':'142 71% 45%','--accent-foreground':'0 0% 100%',
              '--destructive':'0 84% 60%','--ring':'142 71% 45%',
              '--sidebar-background':'215 14% 9%','--sidebar-foreground':'215 10% 62%',
              '--sidebar-primary':'142 71% 45%','--sidebar-primary-foreground':'0 0% 100%',
              '--sidebar-accent':'215 14% 14%','--sidebar-accent-foreground':'215 15% 92%','--sidebar-ring':'142 71% 45%',
              '--orca-aurora-a':'142 71% 45%','--orca-aurora-b':'215 14% 35%',
              '--orca-glow-spot':'142 71% 55%','--orca-primary-h':'142 71% 45%'
            }
          };
          var r = document.documentElement;
          r.setAttribute('data-theme', t);
          var map = TOKENS[t];
          for (var k in map) r.style.setProperty(k, map[k]);
          var prefsRaw = readCache('ui-prefs-cache');
          if (prefsRaw) {
            var prefs = JSON.parse(prefsRaw);
            var hex = prefs && prefs.customAccentEnabled && typeof prefs.customAccent === 'string' ? prefs.customAccent.trim() : '';
            if (/^#[0-9a-f]{6}$/i.test(hex)) {
              var n = parseInt(hex.slice(1), 16), rr = (n >> 16) & 255, gg = (n >> 8) & 255, bb = n & 255;
              rr /= 255; gg /= 255; bb /= 255;
              var max = Math.max(rr, gg, bb), min = Math.min(rr, gg, bb), h = 0, s = 0, l = (max + min) / 2;
              if (max !== min) {
                var d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                h = max === rr ? (gg - bb) / d + (gg < bb ? 6 : 0) : max === gg ? (bb - rr) / d + 2 : (rr - gg) / d + 4;
                h *= 60;
              }
              h = Math.round(h); s = Math.max(60, Math.min(92, Math.round(s * 100)));
              var light = t === 'platinum';
              var primary = h + ' ' + s + '% ' + (light ? '48%' : '60%');
              r.style.setProperty('--primary', primary);
              r.style.setProperty('--primary-foreground', light ? '0 0% 100%' : '0 0% 4%');
              r.style.setProperty('--accent', primary);
              r.style.setProperty('--ring', primary);
              r.style.setProperty('--sidebar-primary', primary);
              r.style.setProperty('--sidebar-ring', primary);
              r.style.setProperty('--orca-aurora-a', primary);
              r.style.setProperty('--orca-glow-spot', h + ' ' + Math.min(100, s + 5) + '% ' + (light ? '60%' : '70%'));
              r.style.setProperty('--orca-primary-h', primary);
            }
          }
          r.style.backgroundColor = SOLID[t];
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', SOLID[t]);
        } catch (e) {}
      })();
    </script>
