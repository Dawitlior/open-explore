    <!-- Theme preboot — applies the FULL token map before first paint to prevent FOUC across midnight/indigo/platinum. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('orca:theme-cache');
          if (t !== 'midnight' && t !== 'indigo' && t !== 'platinum') t = 'midnight';
          var SOLID = { midnight: '#020202', indigo: '#070817', platinum: '#f4efe4' };
          // Full token maps — MUST stay in sync with src/lib/trading-theme.ts cssVars.
          var TOKENS = {
            midnight: {
              '--background':'0 0% 0.8%','--foreground':'210 20% 96%',
              '--card':'0 0% 3.1%','--card-foreground':'210 20% 96%',
              '--popover':'0 0% 3.1%','--popover-foreground':'210 20% 96%',
              '--primary':'184 100% 50%','--primary-foreground':'0 0% 0%',
              '--secondary':'0 0% 6%','--secondary-foreground':'210 20% 96%',
              '--muted':'0 0% 9%','--muted-foreground':'215 12% 55%',
              '--accent':'184 100% 50%','--accent-foreground':'0 0% 0%',
              '--destructive':'0 100% 56%','--ring':'184 100% 50%',
              '--sidebar-background':'0 0% 2%','--sidebar-foreground':'215 12% 55%',
              '--sidebar-primary':'184 100% 50%','--sidebar-primary-foreground':'0 0% 0%',
              '--sidebar-accent':'0 0% 6%','--sidebar-accent-foreground':'210 20% 96%','--sidebar-ring':'184 100% 50%',
              '--orca-aurora-a':'184 100% 50%','--orca-aurora-b':'258 90% 66%',
              '--orca-glow-spot':'184 100% 50%','--orca-primary-h':'184 100% 50%'
            },
            indigo: {
              '--background':'255 60% 4%','--foreground':'258 90% 95%',
              '--card':'258 50% 9%','--card-foreground':'258 90% 95%',
              '--popover':'258 50% 9%','--popover-foreground':'258 90% 95%',
              '--primary':'258 90% 76%','--primary-foreground':'255 60% 4%',
              '--secondary':'258 40% 14%','--secondary-foreground':'258 90% 95%',
              '--muted':'258 30% 16%','--muted-foreground':'258 20% 65%',
              '--accent':'258 90% 76%','--accent-foreground':'255 60% 4%',
              '--destructive':'350 90% 60%','--ring':'258 90% 76%',
              '--sidebar-background':'258 60% 6%','--sidebar-foreground':'258 20% 65%',
              '--sidebar-primary':'258 90% 76%','--sidebar-primary-foreground':'255 60% 4%',
              '--sidebar-accent':'258 40% 14%','--sidebar-accent-foreground':'258 90% 95%','--sidebar-ring':'258 90% 76%',
              '--orca-aurora-a':'258 90% 66%','--orca-aurora-b':'230 90% 60%',
              '--orca-glow-spot':'258 90% 76%','--orca-primary-h':'258 90% 76%'
            },
            platinum: {
              '--background':'40 30% 96%','--foreground':'222 47% 11%',
              '--card':'0 0% 100%','--card-foreground':'222 47% 11%',
              '--popover':'0 0% 100%','--popover-foreground':'222 47% 11%',
              '--primary':'224 76% 48%','--primary-foreground':'0 0% 100%',
              '--secondary':'40 25% 92%','--secondary-foreground':'222 47% 11%',
              '--muted':'40 20% 90%','--muted-foreground':'215 20% 35%',
              '--accent':'224 76% 48%','--accent-foreground':'0 0% 100%',
              '--destructive':'0 75% 42%','--ring':'224 76% 48%',
              '--sidebar-background':'40 30% 94%','--sidebar-foreground':'215 20% 35%',
              '--sidebar-primary':'224 76% 48%','--sidebar-primary-foreground':'0 0% 100%',
              '--sidebar-accent':'40 25% 92%','--sidebar-accent-foreground':'222 47% 11%','--sidebar-ring':'224 76% 48%',
              '--orca-aurora-a':'224 76% 60%','--orca-aurora-b':'38 80% 55%',
              '--orca-glow-spot':'224 76% 60%','--orca-primary-h':'224 76% 48%'
            }
          };
          var r = document.documentElement;
          r.setAttribute('data-theme', t);
          var map = TOKENS[t];
          for (var k in map) r.style.setProperty(k, map[k]);
          r.style.backgroundColor = SOLID[t];
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', SOLID[t]);
        } catch (e) {}
      })();
    </script>

    <style>
      #orca-splash{position:fixed;inset:0;z-index:2147483647;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:28px;background:var(--orca-splash-bg,#020202);transition:opacity .55s ease;pointer-events:none}
      #orca-splash.is-hidden{opacity:0}
      #orca-splash .orca-mark{width:96px;height:96px;border-radius:24px;display:grid;place-items:center;position:relative;animation:orca-breathe 2.4s ease-in-out infinite}
      #orca-splash .orca-mark img{width:72px;height:72px;object-fit:contain;filter:drop-shadow(0 6px 24px rgba(0,0,0,.45))}
      #orca-splash .orca-ring{position:absolute;inset:-10px;border-radius:50%;border:1.5px solid transparent;border-top-color:hsl(var(--primary, 184 100% 50%));border-right-color:hsl(var(--primary, 184 100% 50%) / .35);animation:orca-spin 1.4s linear infinite}
      #orca-splash .orca-ring.outer{inset:-22px;border-top-color:hsl(var(--primary, 184 100% 50%) / .55);border-right-color:transparent;animation-duration:2.2s;animation-direction:reverse}
      #orca-splash .orca-label{font-family:'IBM Plex Mono','Poppins',ui-monospace,monospace;font-size:11px;letter-spacing:.42em;text-transform:uppercase;color:hsl(var(--muted-foreground, 215 12% 55%));opacity:.85}
      @keyframes orca-spin{to{transform:rotate(360deg)}}
      @keyframes orca-breathe{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.04);opacity:.92}}
      @media (prefers-reduced-motion: reduce){#orca-splash .orca-ring,#orca-splash .orca-mark{animation:none}}
    </style>

  <body>
    <div id="root"></div>
    <div id="orca-splash" aria-hidden="true" role="presentation">
      <div class="orca-mark">
        <span class="orca-ring outer"></span>
        <span class="orca-ring"></span>
        <img src="/orca-logo.png" alt="" />
      </div>
      <div class="orca-label">ORCA · LOADING</div>
    </div>
    <script>
      (function(){
        try{
          var t=document.documentElement.getAttribute('data-theme')||'midnight';
          var SOLID={midnight:'#020202',indigo:'#070817',platinum:'#f4efe4'};
          document.documentElement.style.setProperty('--orca-splash-bg',SOLID[t]||'#020202');
        }catch(e){}
        var start=performance.now();
        var MIN_MS=1100;       // minimum visible time so it doesn't flicker
        var MAX_MS=8000;       // safety net
        var hidden=false;
        function hide(){
          if(hidden) return; hidden=true;
          var el=document.getElementById('orca-splash');
          if(!el) return;
          el.classList.add('is-hidden');
          setTimeout(function(){ if(el && el.parentNode) el.parentNode.removeChild(el); }, 650);
        }
        function ready(){
          var root=document.getElementById('root');
          var hasContent=root && root.firstElementChild;
          var elapsed=performance.now()-start;
          if(hasContent && elapsed>=MIN_MS) return hide();
          if(elapsed>=MAX_MS) return hide();
          requestAnimationFrame(ready);
        }
        if(document.readyState==='loading'){
          document.addEventListener('DOMContentLoaded', function(){ requestAnimationFrame(ready); });
        } else {
          requestAnimationFrame(ready);
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
