\u05D4 \u05D1\u05E8\u05D5\u05D5\u05D7.":"A weekend is approaching and you have an open position in profit.","\u05E1\u05D5\u05D2\u05E8 \u05D0\u05D5 \u05DE\u05E7\u05D8\u05D9\u05DF \u2014 \u05E1\u05D9\u05DB\u05D5\u05DF \u05E1\u05D5\u05E3-\u05E9\u05D1\u05D5\u05E2 \u05DC\u05D0 \u05E9\u05D5\u05D5\u05D4":"Close or reduce \u2014 weekend risk is not worth it","\u05DE\u05E9\u05D0\u05D9\u05E8 \u05E2\u05DD \u05E1\u05D8\u05D5\u05E4":"Leave it with a stop","\u05DE\u05E9\u05D0\u05D9\u05E8 \u05D4\u05DB\u05D5\u05DC \u05E4\u05EA\u05D5\u05D7, \u05D0\u05D5\u05E4\u05D8\u05D9\u05DE\u05D9":"Leave everything open, optimistic","\u05DB\u05DE\u05D4 \u05E4\u05D5\u05D6\u05D9\u05E6\u05D9\u05D5\u05EA \u05E4\u05EA\u05D5\u05D7\u05D5\u05EA \u05D0\u05EA\u05D4 \u05DE\u05D7\u05D6\u05D9\u05E7 \u05D1\u05D5-\u05D6\u05DE\u05E0\u05D9\u05EA \u05D1\u05D3\u05E8\u05DA \u05DB\u05DC\u05DC?":"How many open positions do you usually hold at once?","\u05DE\u05E2\u05D8 \u05D5\u05DE\u05DE\u05D5\u05E7\u05D3\u05D5\u05EA":"Few and focused","\u05DB\u05DE\u05D4, \u05DE\u05E4\u05D5\u05D6\u05E8":"Several, spread out","\u05D4\u05E8\u05D1\u05D4, \u05E7\u05E9\u05D4 \u05DC\u05D9 \u05DC\u05E2\u05E7\u05D5\u05D1 \u05D0\u05D7\u05E8\u05D9 \u05D4\u05DB\u05D5\u05DC":"Many, it is hard for me to track them all","\u05DB\u05DE\u05D4 \u05DE\u05D4\u05D7\u05E9\u05D1\u05D5\u05DF \u05D0\u05EA\u05D4 \u05DE\u05D5\u05DB\u05DF \u05DC\u05D4\u05E4\u05E1\u05D9\u05D3 \u05DC\u05E4\u05E0\u05D9 \u05E9\u05D0\u05EA\u05D4 \u05E2\u05D5\u05E6\u05E8 \u05D4\u05DB\u05D5\u05DC \u05D5\u05DE\u05E2\u05E8\u05D9\u05DA \u05DE\u05D7\u05D3\u05E9?":"How much of the account are you willing to lose before you stop everything and reassess?","\u05D9\u05E9 \u05DC\u05D9 \u05D2\u05D1\u05D5\u05DC \u05D1\u05E8\u05D5\u05E8 (\u05DC\u05DE\u05E9\u05DC 10\u201315%)":"I have a clear limit (e.g. 10\u201315%)","\u05DC\u05D0 \u05D7\u05E9\u05D1\u05EA\u05D9 \u05E2\u05DC \u05DE\u05E1\u05E4\u05E8":"I have not thought of a number","\u05D0\u05D9\u05DF \u05D2\u05D1\u05D5\u05DC, \u05D0\u05E0\u05D9 \u05DE\u05D0\u05DE\u05D9\u05DF \u05E9\u05D0\u05D7\u05D6\u05D5\u05E8":"No limit, I believe I will recover","\u05D0\u05E0\u05D9 \u05D3\u05D1\u05E7 \u05D1\u05EA\u05D5\u05DB\u05E0\u05D9\u05EA \u05D2\u05DD \u05DB\u05E9\u05D4\u05E9\u05D5\u05E7 \u05DE\u05E4\u05EA\u05D4 \u05D0\u05D5\u05EA\u05D9 \u05DC\u05E1\u05D8\u05D5\u05EA.":"I stick to the plan even when the market tempts me to deviate.","\u05E7\u05D5\u05E8\u05D4 \u05DC\u05D9 \u05DC\u05E4\u05EA\u05D5\u05D7 \u05E2\u05E1\u05E7\u05D0\u05D5\u05EA \u05E9\u05DC\u05D0 \u05EA\u05DB\u05E0\u05E0\u05EA\u05D9, \u05E1\u05EA\u05DD \u05DB\u05D9 \u05D4\u05E9\u05D5\u05E7 \u05D6\u05D6.":"I sometimes open trades I did not plan, just because the market moved.","\u05D0\u05D7\u05E8\u05D9 \u05D4\u05E4\u05E1\u05D3, \u05D0\u05E0\u05D9 \u05E0\u05D5\u05D8\u05D4 \u05DC\u05D4\u05D9\u05DB\u05E0\u05E1 \u05DE\u05D4\u05E8 \u05DE\u05D0\u05D5\u05D3 \u05DC\u05E2\u05E1\u05E7\u05D4 \u05D4\u05D1\u05D0\u05D4.":"After a loss, I tend to enter the next trade very quickly.","\u05D9\u05E9 \u05DC\u05D9 \u05E9\u05D2\u05E8\u05D4 \u05E7\u05D1\u05D5\u05E2\u05D4 \u05DC\u05E4\u05E0\u05D9 \u05E9\u05D0\u05E0\u05D9 \u05E0\u05D5\u05D2\u05E2 \u05D1\u05E9\u05D5\u05E7 \u05D1\u05DB\u05DC \u05D9\u05D5\u05DD.":"I have a fixed routine before I touch the market each day.","\u05D0\u05E0\u05D9 \u05DE\u05D6\u05D9\u05D6 \u05D0\u05EA \u05D4\u05E1\u05D8\u05D5\u05E4 \u05DB\u05E9\u05D4\u05E9\u05D5\u05E7 \u05DE\u05EA\u05E7\u05E8\u05D1 \u05D0\u05DC\u05D9\u05D5, \u05DB\u05D3\u05D9 \u05DC\u05EA\u05EA \u05DC\u05E2\u05E1\u05E7\u05D4 \u05E2\u05D5\u05D3 \u05DE\u05E8\u05D7\u05D1.":"I move the stop when the market approaches it, to give the trade more room.","\u05D4\u05E4\u05E1\u05D3\u05EA \u05D4\u05D9\u05D5\u05DD \u05D0\u05EA \u05DE\u05DB\u05E1\u05EA \u05D4\u05D4\u05E4\u05E1\u05D3 \u05D4\u05D9\u05D5\u05DE\u05D9\u05EA \u05E9\u05E7\u05D1\u05E2\u05EA \u05DC\u05E2\u05E6\u05DE\u05DA.":"You lost your self-imposed daily loss cap today.","\u05E1\u05D5\u05D2\u05E8 \u05D0\u05EA \u05D4\u05DE\u05E1\u05DA, \u05E1\u05D9\u05D9\u05DE\u05EA\u05D9 \u05DC\u05D4\u05D9\u05D5\u05DD":"Close the screen, I am done for today","\u05DE\u05DE\u05E9\u05D9\u05DA \u05D1\u05D6\u05D4\u05D9\u05E8\u05D5\u05EA":"Continue cautiously","\u05D7\u05D9\u05D9\u05D1 \u05DC\u05D4\u05D7\u05D6\u05D9\u05E8 \u2014 \u05DE\u05DE\u05E9\u05D9\u05DA \u05DC\u05E1\u05D7\u05D5\u05E8":"Must win it back \u2014 keep trading","\u05DE\u05D4\u05DC\u05DA \u05D7\u05D3 \u05D1\u05DE\u05D8\u05D1\u05E2 \u05E9\u05D0\u05D9\u05DF \u05DC\u05DA \u05D1\u05D5 \u05EA\u05D5\u05DB\u05E0\u05D9\u05EA.":"A sharp move in a coin you have no plan for.","\u05DE\u05EA\u05E2\u05DC\u05DD, \u05D6\u05D4 \u05DC\u05D0 \u05E9\u05DC\u05D9":"Ignore it, it is not mine","\u05D1\u05D5\u05D3\u05E7 \u05DE\u05D4\u05E8 \u05D0\u05DD \u05D9\u05E9 \u05DB\u05E0\u05D9\u05E1\u05D4":"Quickly check for an entry","\u05E7\u05D5\u05E4\u05E5 \u05E4\u05E0\u05D9\u05DE\u05D4, \u05DC\u05D0 \u05DE\u05E4\u05E1\u05E4\u05E1":"Jump in, not missing out","\u05D4\u05E9\u05D5\u05E7 \u05E4\u05EA\u05D5\u05D7 \u05D5\u05D0\u05EA\u05D4 \u05DE\u05E8\u05D2\u05D9\u05E9 \u05E9\u05D0\u05EA\u05D4 \u05DC\u05D0 \u05D1\u05E4\u05D5\u05E7\u05D5\u05E1 \u05D4\u05D9\u05D5\u05DD.":"The market is open and you feel you are not in focus today.","\u05DC\u05D0 \u05E1\u05D5\u05D7\u05E8, \u05D9\u05D5\u05DD \u05DC\u05D0 \u05DE\u05EA\u05D0\u05D9\u05DD":"Do not trade, not the right day","\u05E1\u05D5\u05D7\u05E8 \u05E7\u05D8\u05DF":"Trade small","\u05E1\u05D5\u05D7\u05E8 \u05E8\u05D2\u05D9\u05DC, \u05D0\u05D9 \u05D0\u05E4\u05E9\u05E8 \u05DC\u05E4\u05E1\u05E4\u05E1":"Trade as usual, you cannot miss out","\u05E4\u05D7\u05D3 \u05DC\u05E4\u05E1\u05E4\u05E1 (FOMO) \u05D3\u05D5\u05D7\u05E3 \u05D0\u05D5\u05EA\u05D9 \u05DC\u05E2\u05E1\u05E7\u05D0\u05D5\u05EA \u05E9\u05D0\u05E0\u05D9 \u05DE\u05EA\u05D7\u05E8\u05D8 \u05E2\u05DC\u05D9\u05D4\u05DF.":"Fear of missing out (FOMO) pushes me into trades I regret.","\u05D0\u05E0\u05D9 \u05DE\u05E8\u05D2\u05D9\u05E9 \u05E4\u05D9\u05D6\u05D9\u05EA \u05D0\u05EA \u05D4\u05DC\u05D7\u05E5 (\u05D3\u05D5\u05E4\u05E7, \u05D1\u05D8\u05DF) \u05DB\u05E9\u05E4\u05D5\u05D6\u05D9\u05E6\u05D9\u05D4 \u05D2\u05D3\u05D5\u05DC\u05D4 \u05E4\u05EA\u05D5\u05D7\u05D4.":"I physically feel the stress (heart rate, stomach) when a big position is open.","\u05D4\u05E6\u05DC\u05D7\u05D4 \u05D2\u05D3\u05D5\u05DC\u05D4 \u05D2\u05D5\u05E8\u05DE\u05EA \u05DC\u05D9 \u05DC\u05D4\u05E8\u05D2\u05D9\u05E9 \u05D1\u05DC\u05EA\u05D9-\u05DE\u05E0\u05D5\u05E6\u05D7 \u05DC\u05D6\u05DE\u05DF \u05DE\u05D4.":"A big success makes me feel invincible for a while.","\u05D0\u05EA\u05D4 \u05D1\u05D3\u05E8\u05D0\u05D5\u05D3\u05D0\u05D5\u05DF \u05E9\u05DC \u05DB\u05DE\u05D4 \u05E9\u05D1\u05D5\u05E2\u05D5\u05EA. \u05DE\u05D4 \u05D4\u05DE\u05E6\u05D1 \u05D4\u05E8\u05D2\u05E9\u05D9?":"You are in a drawdown of several weeks. What is your emotional state?","\u05DE\u05E7\u05D5\u05D1\u05DC, \u05D7\u05DC\u05E7 \u05DE\u05D4\u05DE\u05E9\u05D7\u05E7":"Accepted, part of the game","\u05DE\u05EA\u05D5\u05E1\u05DB\u05DC \u05D0\u05D1\u05DC \u05DE\u05DE\u05E9\u05D9\u05DA":"Frustrated but carrying on","\u05DE\u05D0\u05D1\u05D3 \u05D1\u05D9\u05D8\u05D7\u05D5\u05DF, \u05E9\u05D5\u05E7\u05DC \u05DC\u05E9\u05E0\u05D5\u05EA \u05D4\u05DB\u05D5\u05DC":"Losing confidence, considering changing everything","\u05E2\u05E9\u05D9\u05EA \u05D8\u05E2\u05D5\u05EA \u05D8\u05D9\u05E4\u05E9\u05D9\u05EA \u05E9\u05E2\u05DC\u05EA\u05D4 \u05DB\u05E1\u05E3. \u05D0\u05D9\u05DA \u05D0\u05EA\u05D4 \u05DE\u05DE\u05E9\u05D9\u05DA \u05DE\u05DB\u05D0\u05DF?":"You made a silly mistake that cost money. How do you carry on from here?","\u05E8\u05D5\u05E9\u05DD \u05DC\u05E7\u05D7 \u05D5\u05DE\u05DE\u05E9\u05D9\u05DA \u05E8\u05D2\u05D5\u05E2":"Note the lesson and continue calmly","\u05DE\u05EA\u05E2\u05E6\u05D1\u05DF \u05D0\u05D1\u05DC \u05DE\u05DE\u05E9\u05D9\u05DA":"Get annoyed but continue","\u05E0\u05DB\u05E0\u05E1 \u05DC\u05D8\u05D9\u05DC\u05D8, \u05D4\u05D4\u05D7\u05DC\u05D8\u05D5\u05EA \u05D4\u05D1\u05D0\u05D5\u05EA \u05D2\u05E8\u05D5\u05E2\u05D5\u05EA":"Go on tilt, the next decisions are bad","\u05E7\u05E9\u05D4 \u05DC\u05D9 \u05DC\u05D4\u05D7\u05D6\u05D9\u05E7 \u05E2\u05E1\u05E7\u05D4 \u05DE\u05E0\u05E6\u05D7\u05EA \u2014 \u05D0\u05E0\u05D9 \u05DE\u05DE\u05D4\u05E8 \u05DC\u05DE\u05DE\u05E9 \u05E8\u05D5\u05D5\u05D7.":"It is hard for me to hold a winning trade \u2014 I rush to take profit.","\u05D0\u05E0\u05D9 \u05DE\u05E8\u05D2\u05D9\u05E9 \u05E9\u05D0\u05E0\u05D9 \u05D7\u05D9\u05D9\u05D1 \u05DC\u05D4\u05D9\u05D5\u05EA \u05D1\u05E4\u05D5\u05D6\u05D9\u05E6\u05D9\u05D4 \u05DB\u05D3\u05D9 \u05DC\u05D0 \u05DC\u05D1\u05D6\u05D1\u05D6 \u05D0\u05EA \u05D4\u05D9\u05D5\u05DD.":"I feel I must be in a position so as not to waste the day.","\u05D0\u05E0\u05D9 \u05DE\u05E1\u05D5\u05D2\u05DC \u05DC\u05E8\u05D0\u05D5\u05EA \u05D4\u05D6\u05D3\u05DE\u05E0\u05D5\u05EA \u05D1\u05D9\u05E0\u05D5\u05E0\u05D9\u05EA, \u05DC\u05D5\u05D5\u05EA\u05E8 \u05E2\u05DC\u05D9\u05D4, \u05D5\u05DC\u05D7\u05DB\u05D5\u05EA \u05DC\u05D8\u05D5\u05D1\u05D4.":"I can see a mediocre opportunity, pass on it, and wait for a good one.","\u05E2\u05E1\u05E7\u05D4 \u05D6\u05D6\u05D4 \u05DC\u05DB\u05D9\u05D5\u05D5\u05E0\u05DA, \u05D0\u05D1\u05DC \u05DC\u05D0\u05D8. \u05DE\u05D4 \u05EA\u05E2\u05E9\u05D4?":"A trade moves your way, but slowly. What do you do?","\u05E0\u05D5\u05EA\u05DF \u05DC\u05D4 \u05D6\u05DE\u05DF \u05DC\u05E4\u05D9 \u05D4\u05EA\u05D5\u05DB\u05E0\u05D9\u05EA":"Give it time by the plan","\u05E1\u05D5\u05D2\u05E8, \u05DE\u05E9\u05E2\u05DE\u05DD \u05D0\u05D5\u05EA\u05D9":"Close it, it bores me","\u05DE\u05D5\u05E1\u05D9\u05E3 \u05DB\u05D3\u05D9 \u05DC\u05D4\u05D0\u05D9\u05E5 \u05EA\u05E9\u05D5\u05D0\u05D4":"Add to speed up the return","\u05D0\u05D7\u05E8\u05D9 \u05E8\u05E6\u05E3 \u05D4\u05E4\u05E1\u05D3\u05D9\u05DD \u05D0\u05E0\u05D9 \u05DE\u05E7\u05D8\u05D9\u05DF \u05D2\u05D5\u05D3\u05DC \u05DE\u05E4\u05D7\u05D3, \u05DC\u05D0 \u05DE\u05EA\u05D5\u05DA \u05D7\u05D9\u05E9\u05D5\u05D1.":"After a losing streak I reduce size out of fear, not calculation.","\u05D0\u05E0\u05D9 \u05D1\u05D5\u05D8\u05D7 \u05D1\u05E9\u05D9\u05D8\u05D4 \u05E9\u05DC\u05D9 \u05DB\u05D9 \u05D1\u05D3\u05E7\u05EA\u05D9 \u05D0\u05D5\u05EA\u05D4, \u05DC\u05D0 \u05DB\u05D9 \u05D4\u05D9\u05D0 \u05DE\u05E8\u05D2\u05D9\u05E9\u05D4 \u05E0\u05DB\u05D5\u05E0\u05D4.":"I trust my method because I tested it, not because it feels right.","\u05D0\u05E0\u05D9 \u05E0\u05DE\u05E0\u05E2 \u05DE\u05E2\u05E1\u05E7\u05D0\u05D5\u05EA \u05D0\u05D7\u05E8\u05D9 \u05D4\u05E4\u05E1\u05D3 \u05DB\u05D9 \u05D0\u05E0\u05D9 \u05DE\u05D0\u05D1\u05D3 \u05D0\u05DE\u05D5\u05DF \u05D1\u05E2\u05E6\u05DE\u05D9.":"I avoid trades after a loss because I lose trust in myself.","\u05D4\u05E4\u05E1\u05D3\u05EA 5 \u05D1\u05E8\u05E6\u05E3 \u05E2\u05DD \u05E9\u05D9\u05D8\u05D4 \u05D1\u05D3\u05D5\u05E7\u05D4. \u05DE\u05D4 \u05EA\u05E2\u05E9\u05D4?":"You lost 5 in a row with a tested method. What do you do?","\u05DE\u05DE\u05E9\u05D9\u05DA \u05DC\u05E4\u05D9 \u05D4\u05E9\u05D9\u05D8\u05D4 \u2014 \u05D6\u05D4 \u05D7\u05DC\u05E7 \u05DE\u05D4\u05E4\u05D9\u05D6\u05D5\u05E8":"Keep following the method \u2014 it is part of the distribution","\u05DE\u05E7\u05D8\u05D9\u05DF \u05D2\u05D5\u05D3\u05DC \u05D6\u05DE\u05E0\u05D9\u05EA":"Reduce size temporarily","\u05D6\u05D5\u05E0\u05D7 \u05D0\u05EA \u05D4\u05E9\u05D9\u05D8\u05D4 \u05D5\u05DE\u05D7\u05E4\u05E9 \u05D7\u05D3\u05E9\u05D4":"Abandon the method and look for a new one","\u05D0\u05E0\u05D9 \u05E0\u05E6\u05DE\u05D3 \u05DC\u05D3\u05E2\u05D4 \u05E9\u05DC\u05D9 \u05E2\u05DC \u05D4\u05E9\u05D5\u05E7 \u05D2\u05DD \u05DE\u05D5\u05DC \u05E2\u05D5\u05D1\u05D3\u05D5\u05EA \u05E9\u05E1\u05D5\u05EA\u05E8\u05D5\u05EA \u05D0\u05D5\u05EA\u05D4.":"I cling to my view of the market even against contradicting facts.","\u05E7\u05DC \u05DC\u05D9 \u05DC\u05E7\u05D1\u05DC \u05E9\u05D8\u05E2\u05D9\u05EA\u05D9 \u05D5\u05DC\u05E6\u05D0\u05EA \u05DE\u05E2\u05E1\u05E7\u05D4.":"It is easy for me to accept I was wrong and exit a trade.","\u05D0\u05EA\u05D4 \u05D1\u05E9\u05D5\u05E8\u05D8, \u05D5\u05D9\u05E6\u05D0 \u05D3\u05D0\u05D8\u05D4 \u05E9\u05DE\u05E9\u05E0\u05D4 \u05D0\u05EA \u05D4\u05EA\u05DE\u05D5\u05E0\u05D4 \u05DC\u05DB\u05D9\u05D5\u05D5\u05DF \u05DC\u05D5\u05E0\u05D2.":"You are short, and data came out that shifts the picture toward long.","\u05E1\u05D5\u05D2\u05E8 \u05E9\u05D5\u05E8\u05D8, \u05D0\u05D5\u05DC\u05D9 \u05D4\u05D5\u05E4\u05DA \u05DB\u05D9\u05D5\u05D5\u05DF":"Close the short, maybe flip direction","\u05DE\u05D7\u05DB\u05D4 \u05DC\u05E8\u05D0\u05D5\u05EA":"Wait and see","\u05E0\u05E9\u05D0\u05E8 \u05E9\u05D5\u05E8\u05D8, \u05D4\u05D3\u05D0\u05D8\u05D4 \u05D8\u05D5\u05E2\u05D4":"Stay short, the data is wrong","\u05D0\u05E0\u05D9 \u05D1\u05D5\u05D3\u05E7 \u05DE\u05D4 \u201E\u05D4\u05E7\u05D4\u05DC\u201D \u05E2\u05D5\u05E9\u05D4 \u05DC\u05E4\u05E0\u05D9 \u05E9\u05D0\u05E0\u05D9 \u05DE\u05D7\u05DC\u05D9\u05D8.":"I check what \u201Ethe crowd\u201D is doing before I decide.","\u05D0\u05E0\u05D9 \u05DE\u05E8\u05D2\u05D9\u05E9 \u05D1\u05E0\u05D5\u05D7 \u05DC\u05D4\u05D9\u05D5\u05EA \u05D4\u05E6\u05D3 \u05D4\u05D9\u05D7\u05D9\u05D3 \u05D1\u05E2\u05E1\u05E7\u05D4 \u05DE\u05D5\u05DC \u05DB\u05D5\u05DC\u05DD.":"I am comfortable being the only one on a side, against everyone.","\u05DB\u05DC \u05D4\u05D8\u05D9\u05D9\u05DE\u05DC\u05D9\u05D9\u05DF \u05E9\u05DC\u05DA \u05D1\u05D5\u05DC\u05E9\u05D9 \u05E2\u05DC \u05DE\u05D8\u05D1\u05E2 \u05DE\u05E1\u05D5\u05D9\u05DD. \u05DE\u05D4 \u05EA\u05E2\u05E9\u05D4?":"Your whole timeline is bullish on a certain coin. What do you do?","\u05D1\u05D5\u05D3\u05E7 \u05DC\u05D1\u05D3, \u05E1\u05E0\u05D8\u05D9\u05DE\u05E0\u05D8 \u05D4\u05D5\u05D0 \u05DC\u05D0 \u05D0\u05D5\u05EA \u05DB\u05E0\u05D9\u05E1\u05D4":"Research on my own, sentiment is not an entry signal","\u05E0\u05DB\u05E0\u05E1 \u05E7\u05D8\u05DF":"Enter small","\u05E0\u05DB\u05E0\u05E1 \u05D2\u05D3\u05D5\u05DC, \u05D4\u05E7\u05D4\u05DC \u05DE\u05E0\u05D9\u05E2 \u05DE\u05D7\u05D9\u05E8":"Enter big, the crowd moves price","\u05D0\u05E0\u05D9 \u05D9\u05D5\u05D3\u05E2 \u05DE\u05D4\u05D9 \u05EA\u05D5\u05D7\u05DC\u05EA \u05D4\u05EA\u05E9\u05D5\u05D0\u05D4 (expectancy) \u05E9\u05DC \u05D4\u05E9\u05D9\u05D8\u05D4 \u05E9\u05DC\u05D9.":"I know the expectancy of my method.","\u05D0\u05E0\u05D9 \u05D1\u05D5\u05D3\u05E7 \u05E9\u05D9\u05D8\u05D4 \u05E2\u05DC \u05E0\u05EA\u05D5\u05E0\u05D9 \u05E2\u05D1\u05E8 \u05DC\u05E4\u05E0\u05D9 \u05E9\u05D0\u05E0\u05D9 \u05DE\u05E1\u05DB\u05DF \u05E2\u05DC\u05D9\u05D4 \u05DB\u05E1\u05E3.":"I test a method on past data before I risk money on it.","\u05D0\u05E0\u05D9 \u05DE\u05EA\u05D9\u05D9\u05D2 \u05E2\u05E1\u05E7\u05D0\u05D5\u05EA \u05DC\u05E4\u05D9 \u05E1\u05D5\u05D2 \u05E1\u05D8\u05D0\u05E4 \u05DB\u05D3\u05D9 \u05DC\u05D3\u05E2\u05EA \u05DE\u05D4 \u05D1\u05D0\u05DE\u05EA \u05E2\u05D5\u05D1\u05D3 \u05DC\u05D9.":"I tag trades by setup type to know what really works for me.","\u05D9\u05E9 \u05DC\u05DA \u05E8\u05E2\u05D9\u05D5\u05DF \u05D7\u05D3\u05E9 \u05DC\u05E9\u05D9\u05D8\u05D4. \u05DE\u05D4 \u05D4\u05E6\u05E2\u05D3 \u05D4\u05E8\u05D0\u05E9\u05D5\u05DF?":"You have a new idea for a method. What is the first step?","\u05D1\u05D3\u05D9\u05E7\u05D4 \u05E2\u05DC 50+ \u05E2\u05E1\u05E7\u05D0\u05D5\u05EA \u05E2\u05D1\u05E8":"Test on 50+ past trades","\u05DE\u05E0\u05E1\u05D4 \u05E7\u05D8\u05DF \u05D1\u05DB\u05E1\u05E3 \u05D0\u05DE\u05D9\u05EA\u05D9":"Try small with real money","\u05E0\u05DB\u05E0\u05E1, \u05D0\u05E0\u05D9 \u05E1\u05D5\u05DE\u05DA \u05E2\u05DC \u05D4\u05EA\u05D7\u05D5\u05E9\u05D4":"Enter, I trust the feel","\u05D4\u05DE\u05E1\u05D7\u05E8 \u05D0\u05DE\u05D5\u05E8 \u05DC\u05D4\u05D7\u05DC\u05D9\u05E3 \u05DC\u05DA \u05D4\u05DB\u05E0\u05E1\u05D4. \u05D0\u05D9\u05DA \u05D6\u05D4 \u05DE\u05E9\u05E4\u05D9\u05E2 \u05E2\u05DC \u05D4\u05D4\u05D7\u05DC\u05D8\u05D5\u05EA?":"Trading is meant to replace your income. How does that affect decisions?","\u05D0\u05E0\u05D9 \u05DE\u05E4\u05E8\u05D9\u05D3, \u05DC\u05D0 \u05DC\u05D5\u05D7\u05E5 \u05E2\u05DC \u05E8\u05D5\u05D5\u05D7":"I separate them, I do not push for profit","\u05DC\u05E4\u05E2\u05DE\u05D9\u05DD \u05D0\u05E0\u05D9 \u05D3\u05D5\u05D7\u05E3 \u05DB\u05D3\u05D9 \u05DC\u05D4\u05D2\u05D9\u05E2 \u05DC\u05D9\u05E2\u05D3 \u05D7\u05D5\u05D3\u05E9\u05D9":"Sometimes I push to hit a monthly target","\u05D0\u05E0\u05D9 \u05D7\u05D9\u05D9\u05D1 \u05EA\u05E9\u05D5\u05D0\u05D4, \u05D0\u05D6 \u05DC\u05D5\u05E7\u05D7 \u05D9\u05D5\u05EA\u05E8 \u05E1\u05D9\u05DB\u05D5\u05DF":"I need a return, so I take more risk","\u05D0\u05EA\u05D4 \u05D0\u05D5\u05D4\u05D1 \u05DC\u05E4\u05E6\u05D7. \u05DB\u05DE\u05D4 \u05DE\u05D5\u05E8\u05DB\u05D1\u05EA \u05D4\u05E9\u05D9\u05D8\u05D4 \u05E9\u05DC\u05DA?":"You like to crack things. How complex is your method?","\u05E4\u05E9\u05D5\u05D8\u05D4 \u2014 \u05E4\u05E9\u05D8\u05D5\u05EA \u05D4\u05D9\u05D0 \u05D9\u05EA\u05E8\u05D5\u05DF":"Simple \u2014 simplicity is an edge","\u05D3\u05D9 \u05DE\u05D5\u05E8\u05DB\u05D1\u05EA":"Fairly complex","\u05DE\u05D0\u05D5\u05D3 \u05DE\u05D5\u05E8\u05DB\u05D1\u05EA, \u05D0\u05E0\u05D9 \u05DB\u05DC \u05D4\u05D6\u05DE\u05DF \u05DE\u05D5\u05E1\u05D9\u05E3":"Very complex, I keep adding","\u05DB\u05DE\u05D4 \u05DC\u05D7\u05E5 \u05D0\u05EA\u05D4 \u05DE\u05E8\u05D2\u05D9\u05E9 \u05E9\u05D4\u05DE\u05E1\u05D7\u05E8 \u201E\u05D7\u05D9\u05D9\u05D1 \u05DC\u05E2\u05D1\u05D5\u05D3\u201D?":"How much pressure do you feel that trading \u201Emust work\u201D?","\u05DE\u05E2\u05D8, \u05D9\u05E9 \u05DC\u05D9 \u05D2\u05D1 \u05DB\u05DC\u05DB\u05DC\u05D9":"Little, I have financial backing","\u05D4\u05E8\u05D1\u05D4, \u05D6\u05D5 \u05D4\u05D4\u05E6\u05DC\u05D4 \u05E9\u05DC\u05D9":"A lot, it is my way out","\u05E6\u05D9\u05E4\u05D9\u05EA \u05DC\u05D4\u05DB\u05E0\u05E1\u05D4 \u05D7\u05D5\u05D3\u05E9\u05D9\u05EA, \u05D0\u05D1\u05DC \u05DE\u05D2\u05D9\u05E2 \u05D7\u05D5\u05D3\u05E9 \u05DE\u05E4\u05E1\u05D9\u05D3.":"You expected monthly income, but a losing month arrives.","\u05DE\u05E7\u05D5\u05D1\u05DC \u2014 \u05DE\u05DE\u05D5\u05E6\u05E2\u05D9\u05DD \u05E2\u05DC \u05E4\u05E0\u05D9 \u05E9\u05E0\u05D4":"Accepted \u2014 I average over a year",\u05DE\u05EA\u05D5\u05E1\u05DB\u05DC:"Frustrated","\u05DE\u05D2\u05D3\u05D9\u05DC \u05E1\u05D9\u05DB\u05D5\u05DF \u05DB\u05D3\u05D9 \u05DC\u05DB\u05E1\u05D5\u05EA \u05D0\u05EA \u05D4\u05D7\u05D5\u05D3\u05E9":"Increase risk to cover the month","\u05D0\u05EA\u05D4 \u05E8\u05D5\u05E6\u05D4 \u05DC\u05D4\u05D5\u05DB\u05D9\u05D7 \u05DC\u05E2\u05E6\u05DE\u05DA. \u05D0\u05D9\u05DA \u05D6\u05D4 \u05D1\u05D0 \u05DC\u05D9\u05D3\u05D9 \u05D1\u05D9\u05D8\u05D5\u05D9 \u05D1\u05DE\u05E1\u05D7\u05E8?":"You want to prove yourself. How does that show up in trading?","\u05D1\u05DE\u05E9\u05DE\u05E2\u05EA \u2014 \u05D4\u05D4\u05D5\u05DB\u05D7\u05D4 \u05D4\u05D9\u05D0 \u05D1\u05E2\u05E7\u05D1\u05D9\u05D5\u05EA":"In discipline \u2014 the proof is in consistency",\u05E0\u05D9\u05D8\u05E8\u05DC\u05D9:"Neutral","\u05D1\u05E2\u05E1\u05E7\u05D0\u05D5\u05EA \u201E\u05D2\u05D3\u05D5\u05DC\u05D5\u05EA\u201D \u05DB\u05D3\u05D9 \u05DC\u05D4\u05E8\u05D2\u05D9\u05E9 \u05DE\u05E9\u05D4\u05D5":"In \u201Ebig\u201D trades to feel something","\u05DE\u05E1\u05D7\u05E8 \u05D4\u05D5\u05D0 \u05E6\u05D3 \u05DC\u05E2\u05D1\u05D5\u05D3\u05D4 \u05E9\u05DC\u05DA. \u05DB\u05DE\u05D4 \u05D6\u05DE\u05DF \u05E0\u05DB\u05D5\u05DF \u05DC\u05D4\u05E7\u05D3\u05D9\u05E9 \u05DC\u05D5?":"Trading is a side to your job. How much time is right to devote to it?","\u05D6\u05DE\u05DF \u05DE\u05D5\u05D2\u05D3\u05E8 \u05D5\u05DE\u05DE\u05D5\u05E7\u05D3":"A defined, focused amount of time","\u05DE\u05EA\u05D9 \u05E9\u05D9\u05E9":"Whenever I can","\u05DB\u05DC \u05E8\u05D2\u05E2 \u05E4\u05E0\u05D5\u05D9, \u05D2\u05DD \u05D1\u05D0\u05DE\u05E6\u05E2 \u05D4\u05E2\u05D1\u05D5\u05D3\u05D4":"Every free moment, even mid-work","\u05E9\u05E0\u05D4-\u05E9\u05DC\u05D5\u05E9 \u05D1\u05E9\u05D5\u05E7. \u05D1\u05D0\u05D9\u05D6\u05D4 \u05E9\u05DC\u05D1 \u05D0\u05EA\u05D4?":"One to three years in the market. What stage are you at?","\u05DE\u05E6\u05D0\u05EA\u05D9 \u05E9\u05D9\u05D8\u05D4, \u05E2\u05DB\u05E9\u05D9\u05D5 \u05E2\u05D5\u05D1\u05D3 \u05E2\u05DC \u05E2\u05E7\u05D1\u05D9\u05D5\u05EA":"Found a method, now working on consistency","\u05E2\u05D3\u05D9\u05D9\u05DF \u05DE\u05D7\u05E4\u05E9":"Still searching","\u05DE\u05E0\u05E1\u05D4 \u05D4\u05DB\u05D5\u05DC, \u05E7\u05D5\u05E4\u05E5 \u05D1\u05D9\u05DF \u05E9\u05D9\u05D8\u05D5\u05EA":"Trying everything, jumping between methods","3\u20137 \u05E9\u05E0\u05D9\u05DD \u05D1\u05E9\u05D5\u05E7. \u05DE\u05D4 \u05D4\u05D0\u05EA\u05D2\u05E8 \u05D4\u05E2\u05D9\u05E7\u05E8\u05D9 \u05E9\u05DC\u05DA \u05E2\u05DB\u05E9\u05D9\u05D5?":"3\u20137 years in the market. What is your main challenge now?","\u05E2\u05E7\u05D1\u05D9\u05D5\u05EA \u05D5\u05DE\u05E9\u05DE\u05E2\u05EA \u05D1\u05E8\u05D2\u05E2\u05D9 \u05DC\u05D7\u05E5":"Consistency and discipline under pressure","\u05DC\u05DE\u05E6\u05D5\u05D0 edge \u05D7\u05D3\u05E9":"Finding a new edge","\u05D0\u05E0\u05D9 \u05DB\u05D1\u05E8 \u201E\u05D9\u05D5\u05D3\u05E2\u201D, \u05D4\u05D0\u05EA\u05D2\u05E8 \u05D4\u05D5\u05D0 \u05D4\u05E9\u05E2\u05DE\u05D5\u05DD":"I already \u201Eknow\u201D, the challenge is the boredom","\u05DB\u05DE\u05D4 \u05DB\u05E1\u05E3 \u05E9\u05DE\u05EA \u05D1\u05D7\u05E9\u05D1\u05D5\u05DF \u05D4\u05DE\u05E1\u05D7\u05E8 \u05D4\u05E8\u05D0\u05E9\u05D5\u05DF \u05E9\u05DC\u05DA?":"How much money did you put in your first trading account?","\u05E1\u05DB\u05D5\u05DD \u05E7\u05D8\u05DF \u05DC\u05DC\u05DE\u05D9\u05D3\u05D4":"A small amount for learning","\u05E1\u05DB\u05D5\u05DD \u05D1\u05D9\u05E0\u05D5\u05E0\u05D9":"A medium amount","\u05E1\u05DB\u05D5\u05DD \u05D2\u05D3\u05D5\u05DC, \u05E8\u05E6\u05D9\u05EA\u05D9 \u05E9\u05D6\u05D4 \u05D9\u05E9\u05EA\u05DC\u05DD":"A large amount, I wanted it to pay off","\u05E1\u05D5\u05D7\u05E8 \u05D7\u05D3\u05E9 \u05DE\u05D1\u05E7\u05E9 \u05DE\u05DE\u05DA \u05E2\u05E6\u05D4. \u05DE\u05D4 \u05EA\u05D2\u05D9\u05D3 \u05DC\u05D5 \u05E2\u05DC \u05E1\u05D9\u05DB\u05D5\u05DF?":"A new trader asks you for advice. What do you tell him about risk?","\u05E8\u05D9\u05E1\u05D5\u05DF \u05E1\u05D9\u05DB\u05D5\u05DF \u05D4\u05D5\u05D0 \u05D4\u05E2\u05D9\u05E7\u05E8":"Risk control is the main thing","\u05EA\u05DC\u05D5\u05D9 \u05D1\u05E1\u05D2\u05E0\u05D5\u05DF":"Depends on the style","\u05E6\u05E8\u05D9\u05DA \u05DC\u05D4\u05E2\u05D6 \u05DB\u05D3\u05D9 \u05DC\u05D4\u05E8\u05D5\u05D5\u05D9\u05D7":"You have to dare to make money","\u05E2\u05D1\u05E8\u05D5 20 \u05D3\u05E7\u05D5\u05EA \u05D1\u05DC\u05D9 \u05EA\u05E0\u05D5\u05E2\u05D4 \u05D1\u05E4\u05D5\u05D6\u05D9\u05E6\u05D9\u05D4. \u05DE\u05D4 \u05D0\u05EA\u05D4 \u05DE\u05E8\u05D2\u05D9\u05E9?":"20 minutes passed with no movement in the position. How do you feel?","\u05E1\u05D1\u05DC\u05E0\u05D9, \u05E0\u05D5\u05EA\u05DF \u05DC\u05D6\u05D4 \u05DC\u05E2\u05D1\u05D5\u05D3":"Patient, letting it work","\u05E7\u05E6\u05EA \u05D7\u05D5\u05E1\u05E8 \u05DE\u05E0\u05D5\u05D7\u05D4":"A little restless","\u05DE\u05E9\u05D5\u05E2\u05DE\u05DD, \u05DE\u05D7\u05E4\u05E9 \u05DE\u05E9\u05D4\u05D5 \u05D0\u05D7\u05E8 \u05DC\u05E1\u05D7\u05D5\u05E8":"Bored, looking for something else to trade","\u05D0\u05E0\u05D9 \u05DE\u05E6\u05DC\u05D9\u05D7 \u05DC\u05E2\u05DE\u05D5\u05D3 \u05D1\u05DB\u05DC\u05DC\u05D9\u05DD \u05E9\u05D0\u05E0\u05D9 \u05E7\u05D5\u05D1\u05E2 \u05DC\u05E2\u05E6\u05DE\u05D9 \u05DC\u05D0\u05D5\u05E8\u05DA \u05D6\u05DE\u05DF.":"I can stick to the rules I set for myself over time.","\u05E7\u05D5\u05E8\u05D4 \u05E9\u05D0\u05E0\u05D9 \u05E9\u05D5\u05D1\u05E8 \u05D0\u05EA \u05D4\u05DB\u05DC\u05DC\u05D9\u05DD \u05E9\u05DC\u05D9 \u05DB\u05E9\u05D4\u05E9\u05D5\u05E7 \u05DE\u05E4\u05EA\u05D4.":"I sometimes break my own rules when the market tempts me.","\u05D0\u05E0\u05D9 \u05E0\u05E9\u05D0\u05E8 \u05E8\u05D2\u05D5\u05E2 \u05D2\u05DD \u05DB\u05E9\u05E2\u05E1\u05E7\u05D4 \u05D2\u05D3\u05D5\u05DC\u05D4 \u05D6\u05D6\u05D4 \u05D7\u05D6\u05E7 \u05E0\u05D2\u05D3\u05D9.":"I stay calm even when a big trade moves hard against me.","\u05D0\u05E0\u05D9 \u05DE\u05EA\u05E7\u05E9\u05D4 \u05DC\u05E9\u05D7\u05E8\u05E8 \u05D4\u05E4\u05E1\u05D3, \u05D4\u05D5\u05D0 \u05DE\u05DE\u05E9\u05D9\u05DA \u05DC\u05D4\u05E2\u05D9\u05E7 \u05E2\u05DC\u05D9\u05D9.":"I struggle to release a loss, it keeps weighing on me.","\u05D0\u05E0\u05D9 \u05E0\u05D4\u05E0\u05D4 \u05DE\u05D4\u05DE\u05EA\u05E0\u05D4 \u05DC\u05E1\u05D8\u05D0\u05E4 \u05DE\u05D5\u05E9\u05DC\u05DD, \u05DC\u05D0 \u05E8\u05E7 \u05E1\u05D5\u05D1\u05DC \u05D0\u05D5\u05EA\u05D4.":"I enjoy waiting for the perfect setup, not just endure it.","\u05D0\u05E0\u05D9 \u05E0\u05DB\u05E0\u05E1 \u05DC\u05E2\u05E1\u05E7\u05D0\u05D5\u05EA \u05DE\u05EA\u05D5\u05DA \u05D7\u05D5\u05E1\u05E8 \u05E1\u05D1\u05DC\u05E0\u05D5\u05EA, \u05E8\u05E7 \u05DB\u05D3\u05D9 \u05DC\u05D4\u05D9\u05D5\u05EA \u05D1\u05E4\u05E2\u05D5\u05DC\u05D4.":"I enter trades out of impatience, just to be in action.","\u05D0\u05E0\u05D9 \u05DE\u05D0\u05DE\u05D9\u05DF \u05D1\u05D9\u05DB\u05D5\u05DC\u05EA \u05E9\u05DC\u05D9 \u05D2\u05DD \u05D0\u05D7\u05E8\u05D9 \u05EA\u05E7\u05D5\u05E4\u05D4 \u05D7\u05DC\u05E9\u05D4.":"I believe in my ability even after a weak period.","\u05D0\u05E0\u05D9 \u05DE\u05E4\u05E7\u05E4\u05E7 \u05D1\u05E2\u05E6\u05DE\u05D9 \u05DB\u05DC \u05DB\u05DA \u05E2\u05D3 \u05E9\u05D0\u05E0\u05D9 \u05DE\u05E4\u05E1\u05E4\u05E1 \u05E2\u05E1\u05E7\u05D0\u05D5\u05EA \u05D8\u05D5\u05D1\u05D5\u05EA.":"I doubt myself so much that I miss good trades.","\u05D0\u05E0\u05D9 \u05E4\u05EA\u05D5\u05D7 \u05DC\u05E9\u05E0\u05D5\u05EA \u05D0\u05E1\u05D8\u05E8\u05D8\u05D2\u05D9\u05D4 \u05D0\u05DD \u05D4\u05E0\u05EA\u05D5\u05E0\u05D9\u05DD \u05DE\u05E8\u05D0\u05D9\u05DD \u05E9\u05D4\u05D9\u05D0 \u05DC\u05D0 \u05E2\u05D5\u05D1\u05D3\u05EA.":"I am open to changing strategy if the data shows it is not working.","\u05D0\u05D7\u05E8\u05D9 \u05E9\u05D2\u05D9\u05D1\u05E9\u05EA\u05D9 \u05D3\u05E2\u05D4 \u05E2\u05DC \u05E0\u05DB\u05E1, \u05E7\u05E9\u05D4 \u05DC\u05D9 \u05DE\u05D0\u05D5\u05D3 \u05DC\u05E9\u05E0\u05D5\u05EA \u05D0\u05D5\u05EA\u05D4.":"Once I form a view on an asset, it is very hard for me to change it.","\u05D0\u05E0\u05D9 \u05DE\u05E7\u05D1\u05DC \u05D0\u05EA \u05D4\u05D4\u05D7\u05DC\u05D8\u05D5\u05EA \u05E9\u05DC\u05D9 \u05D1\u05E2\u05E6\u05DE\u05D9, \u05D1\u05DC\u05D9 \u05DC\u05D4\u05D9\u05E9\u05E2\u05DF \u05E2\u05DC \u05D0\u05D7\u05E8\u05D9\u05DD.":"I make my decisions on my own, without leaning on others.","\u05D0\u05E0\u05D9 \u05E0\u05E1\u05D7\u05E3 \u05D1\u05E7\u05DC\u05D5\u05EA \u05D0\u05D7\u05E8\u05D9 \u05DE\u05D4 \u05E9\u05DB\u05D5\u05DC\u05DD \u05E2\u05D5\u05E9\u05D9\u05DD \u05D1\u05E9\u05D5\u05E7.":"I am easily swept along by what everyone is doing in the market.","\u05DB\u05DC \u05E4\u05E2\u05D5\u05DC\u05D4 \u05E9\u05DC\u05D9 \u05D1\u05E9\u05D5\u05E7 \u05D4\u05D9\u05D0 \u05D7\u05DC\u05E7 \u05DE\u05DE\u05E2\u05E8\u05DB\u05EA \u05DE\u05EA\u05D5\u05DB\u05E0\u05E0\u05EA, \u05DC\u05D0 \u05D0\u05E7\u05E8\u05D0\u05D9\u05EA.":"Every action of mine in the market is part of a planned system, not random.","\u05D0\u05E0\u05D9 \u05E9\u05D5\u05DC\u05D8 \u05D1\u05D2\u05D5\u05D3\u05DC \u05D4\u05E1\u05D9\u05DB\u05D5\u05DF \u05E9\u05DC\u05D9 \u05D1\u05E7\u05E4\u05D3\u05E0\u05D5\u05EA, \u05D1\u05DB\u05DC \u05E2\u05E1\u05E7\u05D4.":"I control my risk size strictly, on every trade.","\u05D0\u05E0\u05D9 \u05E0\u05DE\u05E9\u05DA \u05DC\u05E2\u05E1\u05E7\u05D0\u05D5\u05EA \u05E2\u05DD \u05E1\u05D9\u05DB\u05D5\u05DF \u05D2\u05D1\u05D5\u05D4 \u05DB\u05D9 \u05D4\u05DF \u05DE\u05E8\u05D2\u05E9\u05D5\u05EA.":"I am drawn to high-risk trades because they are exciting.","\u05D0\u05EA\u05D4 \u05DE\u05E8\u05D5\u05D5\u05D9\u05D7 \u05D9\u05E4\u05D4, \u05D5\u05D0\u05D6 \u05E2\u05E1\u05E7\u05D4 \u05D0\u05D7\u05EA \u05DE\u05D5\u05D7\u05E7\u05EA \u05D7\u05E6\u05D9 \u05DE\u05D4\u05E8\u05D5\u05D5\u05D7. \u05DE\u05D4 \u05EA\u05E2\u05E9\u05D4?":"You are up nicely, then one trade wipes out half the profit. What do you do?","\u05E2\u05D5\u05E6\u05E8, \u05DE\u05E2\u05E8\u05D9\u05DA \u05DE\u05D7\u05D3\u05E9 \u0 %. \u05DE\u05D4 \u05D6\u05D4 \u05E2\u05D5\u05E9\u05D4 \u05DC\u05D1\u05D9\u05D8\u05D7\u05D5\u05DF \u05E9\u05DC\u05DA?":"You were wrong on a trade you were 100% sure of. What does that do to your confidence?","\u05DE\u05D6\u05DB\u05D9\u05E8 \u05DC\u05D9 \u05E9\u05D0\u05D9\u05DF \u05D5\u05D3\u05D0\u05D5\u05EA, \u05D5\u05DE\u05DE\u05E9\u05D9\u05DA":"Reminds me there is no certainty, and I continue","\u05DE\u05E2\u05E8\u05E2\u05E8 \u05E7\u05E6\u05EA":"Shakes it a little","\u05DE\u05EA\u05E8\u05E1\u05E7, \u05DE\u05E4\u05E7\u05E4\u05E7 \u05D1\u05D4\u05DB\u05D5\u05DC":"Crashes it, I doubt everything","\u05D0\u05E0\u05DC\u05D9\u05E1\u05D8 \u05DE\u05E4\u05D5\u05E8\u05E1\u05DD \u05E4\u05E8\u05E1\u05DD \u05E2\u05DE\u05D3\u05D4 \u05D4\u05E4\u05D5\u05DB\u05D4 \u05DE\u05E9\u05DC\u05DA. \u05DE\u05D4 \u05EA\u05E2\u05E9\u05D4?":"A famous analyst published a view opposite to yours. What do you do?","\u05D0\u05DD \u05D4\u05E0\u05EA\u05D5\u05E0\u05D9\u05DD \u05E9\u05DC\u05D9 \u05DE\u05D7\u05D6\u05D9\u05E7\u05D9\u05DD, \u05DE\u05DE\u05E9\u05D9\u05DA \u05E9\u05DC\u05D9":"If my data holds, I continue my way","\u05D1\u05D5\u05D3\u05E7 \u05E9\u05D5\u05D1 \u05D1\u05D2\u05DC\u05DC\u05D5":"Re-check because of him","\u05DE\u05D1\u05D8\u05DC, \u05D4\u05D5\u05D0 \u05D9\u05D5\u05D3\u05E2 \u05D9\u05D5\u05EA\u05E8 \u05DE\u05DE\u05E0\u05D9":"Cancel, he knows more than me","\u05D4\u05D7\u05D6\u05E7\u05EA \u05EA\u05D6\u05D4 \u05E9\u05D1\u05D5\u05E2\u05D9\u05D9\u05DD \u05D5\u05D4\u05D9\u05D0 \u05E0\u05E9\u05D1\u05E8\u05D4. \u05DE\u05D4 \u05E2\u05DB\u05E9\u05D9\u05D5?":"You held a thesis for two weeks and it broke. What now?","\u05DE\u05E8\u05E4\u05D4, \u05DE\u05D7\u05E4\u05E9 \u05E1\u05D8\u05D0\u05E4 \u05D7\u05D3\u05E9 \u05D0\u05D5\u05D1\u05D9\u05D9\u05E7\u05D8\u05D9\u05D1\u05D9":"Let go, look for a fresh objective setup","\u05DC\u05D5\u05E7\u05D7 \u05D4\u05E4\u05E1\u05E7\u05D4 \u05E7\u05E6\u05E8\u05D4":"Take a short break","\u05DE\u05EA\u05E2\u05E7\u05E9, \u05D4\u05D5\u05E9\u05E7\u05E2\u05EA\u05D9 \u05D1\u05D6\u05D4 \u05D9\u05D5\u05EA\u05E8 \u05DE\u05D3\u05D9":"Insist, I am too invested in it","\u05D0\u05EA\u05D4 \u05E8\u05D5\u05E6\u05D4 \u05DC\u05D3\u05E2\u05EA \u05D0\u05DD \u05E9\u05D9\u05D8\u05D4 \u05E8\u05D5\u05D5\u05D7\u05D9\u05EA. \u05E2\u05DC \u05DE\u05D4 \u05EA\u05E1\u05EA\u05DB\u05DC?":"You want to know if a method is profitable. What do you look at?","\u05EA\u05D5\u05D7\u05DC\u05EA \u05E2\u05DC \u05DE\u05D3\u05D2\u05DD \u05D2\u05D3\u05D5\u05DC":"Expectancy over a large sample","\u05DB\u05DE\u05D4 \u05D4\u05E2\u05E1\u05E7\u05D0\u05D5\u05EA \u05D4\u05D0\u05D7\u05E8\u05D5\u05E0\u05D5\u05EA":"The last few trades","\u05EA\u05D7\u05D5\u05E9\u05EA \u05D1\u05D8\u05DF":"Gut feeling","\u05D4\u05E9\u05D5\u05E7 \u05D1\u05DE\u05D2\u05DE\u05EA \u05D3\u05E9\u05D3\u05D5\u05E9 \u05DE\u05E9\u05E2\u05DE\u05DE\u05EA. \u05DE\u05D4 \u05D0\u05EA\u05D4 \u05E2\u05D5\u05E9\u05D4?":"The market is in a boring sideways trend. What do you do?","\u05DE\u05DE\u05E2\u05D9\u05D8, \u05DE\u05D7\u05DB\u05D4 \u05DC\u05E4\u05E8\u05D9\u05E6\u05D4":"Do less, wait for a breakout","\u05E1\u05D5\u05D7\u05E8 \u05D8\u05D5\u05D5\u05D7\u05D9\u05DD \u05E7\u05D8\u05E0\u05D9\u05DD":"Trade small ranges","\u05DE\u05DB\u05E8\u05D9\u05D7 \u05E2\u05E1\u05E7\u05D0\u05D5\u05EA, \u05D7\u05D9\u05D9\u05D1 \u05E4\u05E2\u05D5\u05DC\u05D4":"Force trades, I need action","\u05E2\u05E9\u05D9\u05EA \u05D0\u05EA \u05D4\u05E2\u05E1\u05E7\u05D4 \u05D4\u05DB\u05D9 \u05D8\u05D5\u05D1\u05D4 \u05E9\u05DC\u05DA \u05D4\u05D7\u05D5\u05D3\u05E9. \u05DE\u05D4 \u05D4\u05E1\u05DB\u05E0\u05D4 \u05D4\u05DB\u05D9 \u05D2\u05D3\u05D5\u05DC\u05D4 \u05E2\u05DB\u05E9\u05D9\u05D5?":"You made your best trade of the month. What is the biggest danger now?","\u05DE\u05D5\u05D3\u05E2 \u2014 \u05DC\u05D0 \u05E0\u05E1\u05D7\u05E3 \u05DC\u05D1\u05D9\u05D8\u05D7\u05D5\u05DF \u05D9\u05EA\u05E8":"Aware \u2014 not getting swept into overconfidence","\u05E0\u05D4\u05E0\u05D4 \u05D5\u05DE\u05D2\u05D3\u05D9\u05DC \u05E7\u05E6\u05EA":"Enjoy it and size up a l 5D1\u05DC\u05D9 \u05E4\u05D5\u05D6\u05D9\u05E6\u05D9\u05D4 \u05E4\u05EA\u05D5\u05D7\u05D4?":"How hard is it for you to sit without an open position?","\u05E7\u05DC, \u05D0\u05E0\u05D9 \u05E0\u05D4\u05E0\u05D4 \u05DC\u05D7\u05DB\u05D5\u05EA":"Easy, I enjoy waiting",\u05D1\u05D9\u05E0\u05D5\u05E0\u05D9:"Moderate","\u05DE\u05D0\u05D5\u05D3 \u05E7\u05E9\u05D4, \u05D0\u05E0\u05D9 \u05D7\u05D9\u05D9\u05D1 \u05DC\u05D4\u05D9\u05D5\u05EA \u05D1\u05E4\u05E0\u05D9\u05DD":"Very hard, I must be in","\u05D0\u05D7\u05E8\u05D9 \u05E9\u05E2\u05EA\u05D9\u05D9\u05DD \u05E8\u05E6\u05D5\u05E4\u05D5\u05EA \u05DE\u05D5\u05DC \u05D4\u05DE\u05E1\u05DA, \u05D0\u05D9\u05DA \u05D4\u05D1\u05D9\u05E6\u05D5\u05E2\u05D9\u05DD \u05E9\u05DC\u05DA?":"After two straight hours in front of the screen, how is your performance?","\u05E9\u05D5\u05DE\u05E8 \u05E2\u05DC \u05D7\u05D3\u05D5\u05EA, \u05DC\u05D5\u05E7\u05D7 \u05D4\u05E4\u05E1\u05E7\u05D5\u05EA \u05D9\u05D6\u05D5\u05DE\u05D5\u05EA":"I stay sharp, I take deliberate breaks","\u05E7\u05E6\u05EA \u05D9\u05D5\u05E8\u05D3\u05D9\u05DD":"It drops a little","\u05DE\u05DE\u05E9\u05D9\u05DA \u05D2\u05DD \u05DB\u05E9\u05D0\u05E0\u05D9 \u05E9\u05E8\u05D5\u05E3, \u05D5\u05DE\u05EA\u05D7\u05D9\u05DC \u05DC\u05D8\u05E2\u05D5\u05EA":"I continue even when fried, and start making mistakes","\u05E2\u05E9\u05E8\u05D5\u05EA \u05E2\u05E1\u05E7\u05D0\u05D5\u05EA \u05D1\u05D9\u05D5\u05DD \u2014 \u05D0\u05D9\u05DA \u05D0\u05EA\u05D4 \u05DE\u05D5\u05E0\u05E2 \u05D0\u05D5\u05D1\u05E8\u05D8\u05E8\u05D9\u05D9\u05D3?":"Dozens of trades a day \u2014 how do you prevent overtrading?","\u05DE\u05DB\u05E1\u05EA \u05E2\u05E1\u05E7\u05D0\u05D5\u05EA \u05D9\u05D5\u05DE\u05D9\u05EA \u05E7\u05D1\u05D5\u05E2\u05D4":"A fixed daily trade quota","\u05D0\u05D9\u05DF \u05DE\u05DB\u05E1\u05D4, \u05DB\u05DE\u05D4 \u05E9\u05D9\u05D5\u05E6\u05D0":"No quota, as many as come","\u05E4\u05E1\u05E4\u05E1\u05EA \u05DB\u05E0\u05D9\u05E1\u05D4 \u05D1\u05E9\u05D1\u05E8\u05D9\u05E8 \u05E9\u05E0\u05D9\u05D9\u05D4. \u05DE\u05D4 \u05D0\u05EA\u05D4 \u05DE\u05E8\u05D2\u05D9\u05E9?":"You missed an entry by a split second. How do you feel?","\u05D9\u05E9 \u05E2\u05D5\u05D3 \u05D4\u05D6\u05D3\u05DE\u05E0\u05D5\u05D9\u05D5\u05EA, \u05DE\u05DE\u05E9\u05D9\u05DA":"There are more opportunities, I move on","\u05DE\u05EA\u05E2\u05E6\u05D1\u05DF \u05E8\u05D2\u05E2":"Annoyed for a moment","\u05E8\u05D5\u05D3\u05E3 \u05D0\u05EA \u05D4\u05DE\u05D7\u05D9\u05E8, \u05E0\u05DB\u05E0\u05E1 \u05DE\u05D0\u05D5\u05D7\u05E8":"Chase the price, enter late","\u05D0\u05EA\u05D4 \u05D0\u05DE\u05D5\u05E8 \u05DC\u05E1\u05D2\u05D5\u05E8 \u05D4\u05DB\u05D5\u05DC \u05D1\u05E1\u05D5\u05E3 \u05D4\u05D9\u05D5\u05DD. \u05DB\u05DE\u05D4 \u05E4\u05E2\u05DE\u05D9\u05DD \u05D0\u05EA\u05D4 \u201E\u05DE\u05D7\u05D6\u05D9\u05E7 \u05E2\u05D5\u05D3 \u05E7\u05E6\u05EA\u201D \u05D0\u05DC \u05EA\u05D5\u05DA \u05D4\u05DC\u05D9\u05DC\u05D4?":"You are supposed to close everything at the end of the day. How often do you \u201Ehold a bit longer\u201D into the night?","\u05D0\u05E3 \u05E4\u05E2\u05DD, \u05D7\u05D5\u05E7 \u05D4\u05D5\u05D0 \u05D7\u05D5\u05E7":"Never, a rule is a rule","\u05D4\u05E8\u05D1\u05D4, \u05D1\u05E2\u05D9\u05E7\u05E8 \u05DB\u05E9\u05D6\u05D4 \u05D1\u05DE\u05D9\u05E0\u05D5\u05E1":"Often, mainly when it is in the red","\u05E1\u05D5\u05D5\u05D9\u05E0\u05D2 \u05D3\u05D5\u05E8\u05E9 \u05DC\u05D4\u05D7\u05D6\u05D9\u05E7 \u05DB\u05DE\u05D4 \u05D9\u05DE\u05D9\u05DD. \u05DB\u05DE\u05D4 \u05E7\u05E9\u05D4 \u05DC\u05DA \u05DC\u05D0 \u05DC\u05D1\u05D3\u05D5\u05E7 \u05DB\u05DC \u05D3\u05E7\u05D4?":"Swing requires holding for several days. How hard is it for you not to check every minute?","\u05E1\u05D2\u05D5\u05E8 \u2014 \u05D1\u05D5\u05D3\u05E7 \u05D1\u05E0\u05E7\u05D5\u05D3\u05D5\u05EA \u05E7\u05D1\u05D5\u05E2\u05D5\u05EA":"Closed off \u2014 I check at fixed points","\u05D1\u05D5\u05D3\u05E7 \u05D4\u05E8\u05D1\u05D4":"I check a lot","\u05DB\u05DC \u05D4\u05D6\u05DE\u05DF, \u05D5\u05D6\u05D4 \u05D2\u05D5\u05E8\u05DD \u05DC\u05D9 \u05DC\u05E1\u05D2\u05D5\u05E8 \u05DE\u05D5\u05E7\u05D3\u05DD":"All the time, and it makes me close early","\u05D0\u05EA\u05D4 \u05DE\u05D7\u05D6\u05D9\u05E7 \u05E4\u05D5\u05D6\u05D9\u05E6\u05D9\u05D4 \u05E9\u05D1\u05D5\u05E2\u05D5\u05EA. \u05D9\u05E9 \u05EA\u05E0\u05D5\u05D3\u05D4 \u05D7\u05D3\u05D4 \u05E0\u05D2\u05D3\u05DA \u05D1\u05D0\u05DE\u05E6\u05E2. \u05DE\u05D4 \u05EA\u05E2\u05E9\u05D4?":"You hold a position for weeks. There is a sharp move against you in the middle. What do you do?","\u05DE\u05EA\u05E2\u05DC\u05DD \u05DE\u05E8\u05E2\u05E9, \u05E0\u05E6\u05DE\u05D3 \u05DC\u05EA\u05D6\u05D4":"Ignore the noise, stick to the thesis","\u05D1\u05D5\u05D3\u05E7 \u05E9\u05D5\u05D1 \u05D0\u05EA \u05D4\u05EA\u05D6\u05D4":"Re-check the thesis","\u05E0\u05D1\u05D4\u05DC \u05D5\u05D9\u05D5\u05E6\u05D0 \u05DE\u05D5\u05E7\u05D3\u05DD":"Get scared and exit early","\u05DB\u05DE\u05D4 \u05D4\u05D7\u05D3\u05E9\u05D5\u05EA \u05D4\u05D9\u05D5\u05DE\u05D9\u05D5\u05EA \u05DE\u05D6\u05D9\u05D6\u05D5\u05EA \u05D0\u05D5\u05EA\u05DA \u05D1\u05E4\u05D5\u05D6\u05D9\u05E6\u05D9\u05D4 \u05D0\u05E8\u05D5\u05DB\u05D4?":"How much do the daily news move you in a long-term position?","\u05DB\u05DE\u05E2\u05D8 \u05D1\u05DB\u05DC\u05DC, \u05D9\u05E9 \u05DC\u05D9 \u05EA\u05D6\u05D4":"Almost not at all, I have a thesis","\u05D4\u05E8\u05D1\u05D4, \u05DB\u05DC \u05DB\u05D5\u05EA\u05E8\u05EA \u05DE\u05E8\u05E2\u05D9\u05D3\u05D4 \u05D0\u05D5\u05EA\u05D9":"A lot, every headline shakes me",'\u05D1\u05D0\u05D5\u05EA\u05D5 \u05E8\u05D2\u05E2 \u05E9\u05DC "\u05DC\u05D4\u05D7\u05D6\u05D9\u05E8" \u2014 \u05DE\u05D4 \u05D4\u05E8\u05D2\u05E9\u05EA \u05D1\u05D2\u05D5\u05E3?':"In that moment of \u201Ewinning it back\u201D \u2014 what did you feel in your body?","\u05D4\u05EA\u05E9\u05D5\u05D1\u05D4 \u05DC\u05D0 \u05E0\u05E9\u05E4\u05D8\u05EA. \u05D4\u05D9\u05D0 \u05E8\u05E7 \u05DE\u05D0\u05D9\u05E8\u05D4.":"The answer is not judged. It only illuminates.","\u05D3\u05E8\u05D9\u05DB\u05D5\u05EA, \u05D3\u05D5\u05E4\u05E7 \u05DE\u05D4\u05D9\u05E8, \u05D0\u05D3\u05E8\u05E0\u05DC\u05D9\u05DF":"Alertness, fast heartbeat, adrenaline","\u05E9\u05DB\u05E0\u05E2\u05EA\u05D9 \u05D0\u05EA \u05E2\u05E6\u05DE\u05D9 \u05E9\u05D6\u05D5 \u05D4\u05D7\u05DC\u05D8\u05D4 \u05E7\u05E8\u05D4 \u05D5\u05D4\u05D2\u05D9\u05D5\u05E0\u05D9\u05EA":"I convinced myself it was a cold, logical decision","\u05DC\u05D7\u05E5 \u2014 \u05D7\u05D9\u05D9\u05D1 \u05DC\u05EA\u05E7\u05DF \u05D0\u05EA \u05D6\u05D4 \u05E2\u05DB\u05E9\u05D9\u05D5":"Pressure \u2014 I have to fix this now",'\u05DB\u05DE\u05D4 \u05E4\u05E2\u05DE\u05D9\u05DD \u05D1\u05D7\u05D5\u05D3\u05E9 \u05D0\u05EA\u05D4 \u05DE\u05D5\u05E6\u05D0 \u05D0\u05EA \u05E2\u05E6\u05DE\u05DA "\u05DE\u05EA\u05D5\u05D5\u05DB\u05D7 \u05E2\u05DD \u05D4\u05E9\u05D5\u05E7"?':"How many times a month do you find yourself \u201Earguing with the market\u201D?","\u05D4\u05E8\u05D1\u05D4 \u2014 \u05DB\u05D9 \u05D0\u05E0\u05D9 \u05D9\u05D5\u05D3\u05E2 \u05E9\u05D0\u05E0\u05D9 \u05E6\u05D5\u05D3\u05E7":"A lot \u2014 because I know I am right","\u05E0\u05DB\u05E0\u05E1\u05EA \u05D0\u05D7\u05E8\u05D9 \u05E9\u05D4\u05DE\u05D7\u05D9\u05E8 \u05DB\u05D1\u05E8 \u05E8\u05E5. \u05D0\u05D9\u05E4\u05D4 \u05EA\u05E9\u05D9\u05DD \u05E1\u05D8\u05D5\u05E4?":"You entered after price had already run. Where do you put your stop?","\u05E9\u05D9\u05DD \u05DC\u05D1 \u2014 \u05E0\u05DB\u05E0\u05E1\u05EA \u05E8\u05D7\u05D5\u05E7 \u05DE\u05D4\u05EA\u05DE\u05D9\u05DB\u05D4.":"Note \u2014 you entered far from support.","\u05DE\u05EA\u05D7\u05EA \u05DC\u05EA\u05DE\u05D9\u05DB\u05D4 \u05D4\u05E7\u05E8\u05D5\u05D1\u05D4 \u2014 \u05E1\u05D9\u05DB\u05D5\u05DF \u05E8\u05D7\u05D5\u05E7, \u05D0\u05D1\u05DC \u05DE\u05E1\u05D5\u05D3\u05E8":"Below the nearest support \u2014 a wide stop, but orderly","\u05E6\u05DE\u05D5\u05D3 \u05DE\u05D0\u05D5\u05D3 \u05DC\u05DB\u05E0\u05D9\u05E1\u05D4 \u2014 \u05D9\u05D9\u05E1\u05D7\u05E3 \u05D4\u05D7\u05D5\u05E6\u05D4 \u05DE\u05D4\u05E8":"Very tight to the entry \u2014 it will get shaken out fast","\u05D1\u05DC\u05D9 \u05E1\u05D8\u05D5\u05E4. \u05E0\u05DB\u05E0\u05E1\u05EA\u05D9 \u05D1\u05EA\u05D7\u05D5\u05E9\u05D4":"No stop. I entered on a feeling"});Object.assign(Ga,{"\u05E0\u05EA\u05D7\u05D9\u05DC \u05DE\u05DE\u05DA \u05DB\u05D0\u05D3\u05DD \u2014 \u05DC\u05D0 \u05DB\u05E1\u05D5\u05D7\u05E8. \u05DE\u05D4 \u05D4\u05DB\u05D9 \u05DE\u05EA\u05D0\u05E8 \u05D0\u05D5\u05EA\u05DA?":"Let\u2019s start with you as a person \u2014 not as a trader. What describes you best?","\u05DE\u05EA\u05DB\u05E0\u05DF. \u05D0\u05D5\u05D4\u05D1 \u05E9\u05DC\u05D9\u05D8\u05D4, \u05E8\u05E9\u05D9\u05DE\u05D5\u05EA, \u05E1\u05D3\u05E8":"A planner. I like control, lists, order","\u05E1\u05E4\u05D5\u05E0\u05D8\u05E0\u05D9. \u05D4\u05D5\u05DC\u05DA \u05E2\u05DD \u05D4\u05D6\u05E8\u05DD, \u05DE\u05D7\u05DC\u05D9\u05D8 \u05EA\u05D5\u05DA \u05DB\u05D3\u05D9":"Spontaneous. I go with the flow, decide on the fly","\u05D0\u05E0\u05DC\u05D9\u05D8\u05D9. \u05D7\u05D9\u05D9\u05D1 \u05DC\u05D4\u05D1\u05D9\u05DF \u05D4\u05DB\u05D5\u05DC \u05DC\u05E2\u05D5\u05DE\u05E7 \u05DC\u05E4\u05E0\u05D9 \u05E9\u05D0\u05E0\u05D9 \u05D6\u05D6":"Analytical. I must understand everything deeply before I move","\u05EA\u05D7\u05E8\u05D5\u05EA\u05D9. \u05D7\u05D9\u05D9\u05D1 \u05DC\u05E0\u05E6\u05D7, \u05E7\u05E9\u05D4 \u05DC\u05D9 \u05DC\u05D4\u05E4\u05E1\u05D9\u05D3":"Competitive. I must win, I hate losing","\u05D1\u05D0\u05D9\u05D6\u05D4 \u05D7\u05DC\u05D5\u05DF \u05D1\u05D9\u05D5\u05DD \u05D0\u05EA\u05D4 \u05D4\u05DB\u05D9 \u05D7\u05D3 \u05DE\u05E0\u05D8\u05DC\u05D9\u05EA?":"In which window of the day are you sharpest mentally?","\u05DE\u05EA\u05D9 \u05D4\u05DE\u05D5\u05D7 \u05E9\u05DC\u05DA \u05D1\u05D0\u05DE\u05EA \u05D7\u05D3 \u2014 \u05DC\u05D0 \u05DE\u05EA\u05D9 \u05E0\u05D5\u05D7 \u05DC\u05E1\u05D7\u05D5\u05E8.":"When your mind is truly sharp \u2014 not when it is convenient to trade.","\u05D1\u05D5\u05E7\u05E8 \u05DE\u05D5\u05E7\u05D3\u05DD, \u05DC\u05E4\u05E0\u05D9 \u05E9\u05D4\u05E2\u05D5\u05DC\u05DD \u05DE\u05EA\u05E2\u05D5\u05E8\u05E8":"Early morning, before the world wakes up","\u05DE\u05D0\u05D5\u05D7\u05E8 \u05D1\u05DC\u05D9\u05DC\u05D4, \u05DB\u05E9\u05D4\u05DB\u05D5\u05DC \u05E9\u05E7\u05D8":"Late at night, when everything is quiet","\u05D0\u05DE\u05E6\u05E2 \u05D4\u05D9\u05D5\u05DD, \u05D0\u05D7\u05E8\u05D9 \u05E9\u05D4\u05EA\u05D7\u05DE\u05DE\u05EA\u05D9":"Midday, after I have warmed up","\u05D1\u05DB\u05E0\u05D5\u05EA, \u05D0\u05E0\u05D9 \u05DC\u05D0 \u05D1\u05D0\u05DE\u05EA \u05D9\u05D5\u05D3\u05E2":"Honestly, I do not really know","\u05D0\u05E0\u05D9 \u05D0\u05D3\u05DD \u05DE\u05DE\u05D5\u05E9\u05DE\u05E2 \u2014 \u05D2\u05DD \u05D1\u05D7\u05D9\u05D9\u05DD, \u05DC\u05D0 \u05E8\u05E7 \u05D1\u05DE\u05E1\u05D7\u05E8.":"I am a disciplined person \u2014 in life too, not just in trading.","\u05DE\u05D4 \u05D4\u05D3\u05D1\u05E8 \u05D4\u05E8\u05D0\u05E9\u05D5\u05DF \u05E9\u05D0\u05EA\u05D4 \u05E2\u05D5\u05E9\u05D4 \u05D1\u05E8\u05D2\u05E2 \u05E9\u05D0\u05EA\u05D4 \u05D9\u05D5\u05E9\u05D1 \u05DC\u05E1\u05D7\u05D5\u05E8?":"What is the first thing you do the moment you sit down to trade?","\u05E2\u05D5\u05D1\u05E8 \u05E2\u05DC \u05D4\u05EA\u05D5\u05DB\u05E0\u05D9\u05EA \u05D5\u05D4\u05E8\u05DE\u05D5\u05EA \u05E9\u05E1\u05D9\u05DE\u05E0\u05EA\u05D9 \u05DE\u05E8\u05D0\u05E9":"Go over the plan and the levels I marked in advance","\u05E4\u05D5\u05EA\u05D7 \u05D8\u05D5\u05D5\u05D9\u05D8\u05E8/\u05D8\u05DC\u05D2\u05E8\u05DD \u05DC\u05E8\u05D0\u05D5\u05EA \u05DE\u05D4 \u05DB\u05D5\u05DC\u05DD \u05D0\u05D5\u05DE\u05E8\u05D9\u05DD":"Open Twitter/Telegram to see what everyone is saying","\u05DE\u05E1\u05EA\u05DB\u05DC \u05E2\u05DC \u05D4\u05E4\u05D5\u05D6\u05D9\u05E6\u05D9\u05D5\u05EA \u05D4\u05E4\u05EA\u05D5\u05D7\u05D5\u05EA \u05D5\u05D4\u05E8\u05D5\u05D5\u05D7/\u05D4\u05E4\u05E1\u05D3":"Look at the open positions and the P&L","\u05E0\u05DB\u05E0\u05E1 \u05D9\u05E9\u05E8 \u05DC\u05E4\u05E2\u05D5\u05DC\u05D4, \u05DE\u05D7\u05E4\u05E9 \u D3\u05D9\u05E4\u05D4":"A sharp correction or reversal is near. I will not chase","\u05D6\u05D4 \u05E8\u05E7 \u05DE\u05EA\u05D7\u05D9\u05DC \u2014 \u05E0\u05DB\u05E0\u05E1 \u05E2\u05DB\u05E9\u05D9\u05D5 \u05DC\u05E4\u05E0\u05D9 \u05E9\u05D6\u05D4 \u05D1\u05D5\u05E8\u05D7":"This is just starting \u2014 enter now before it runs away","\u05DE\u05DE\u05EA\u05D9\u05DF \u05DC\u05E1\u05D9\u05DE\u05DF \u05D4\u05D9\u05E4\u05D5\u05DA \u05D1\u05E8\u05D5\u05E8 \u05DC\u05E4\u05E0\u05D9 \u05DB\u05DC \u05E4\u05E2\u05D5\u05DC\u05D4":"Wait for a clear reversal signal before any action","\u05D0\u05DD \u05D4\u05D9\u05D9\u05EA\u05D9 \u05D1\u05E4\u05E0\u05D9\u05DD \u05DE\u05D6\u05DE\u05DF \u2014 \u05DE\u05EA\u05D7\u05D9\u05DC \u05DC\u05E7\u05D7\u05EA \u05E8\u05D5\u05D5\u05D7\u05D9\u05DD":"If I had been in for a while \u2014 start taking profits",'\u05D7\u05D1\u05E8 \u05E9\u05D5\u05DC\u05D7 \u05DC\u05DA \u05D8\u05D5\u05D5\u05D9\u05D8 \u05E9\u05DC \u05D0\u05E0\u05DC\u05D9\u05E1\u05D8: "\u05D1\u05D9\u05D8\u05E7\u05D5\u05D9\u05DF \u05DC-200K \u05E2\u05D3 \u05E1\u05D5\u05E3 \u05D4\u05E8\u05D1\u05E2\u05D5\u05DF". \u05EA\u05D2\u05D5\u05D1\u05EA\u05DA \u05D4\u05E8\u05D0\u05E9\u05D5\u05E0\u05D4?':"A friend sends you an analyst\u2019s tweet: \u201EBitcoin to 200K by quarter-end.\u201D Your first reaction?","\u05DE\u05EA\u05E2\u05DC\u05DD. \u05D6\u05D4 \u05E8\u05E2\u05E9":"Ignore it. It is noise","\u05DE\u05E1\u05E7\u05E8\u05DF \u2014 \u05D1\u05D5\u05D3\u05E7 \u05D0\u05DD \u05D6\u05D4 \u05DE\u05E9\u05E0\u05D4 \u05DE\u05E9\u05D4\u05D5 \u05D1\u05EA\u05D5\u05DB\u05E0\u05D9\u05EA \u05E9\u05DC\u05D9":"Intriguing \u2014 I check whether it changes anything in my plan","\u05DE\u05EA\u05D7\u05D9\u05DC \u05DC\u05D7\u05E9\u05D5\u05D1 \u05DC\u05D4\u05D9\u05DB\u05E0\u05E1 \u05DC\u05DC\u05D5\u05E0\u05D2":"Start thinking about entering long","\u05DE\u05EA\u05DC\u05D4\u05D1 \u05D5\u05E9\u05D5\u05DC\u05D7 \u05D4\u05DC\u05D0\u05D4 \u05DC\u05D7\u05D1\u05E8\u05D9\u05DD":"Get excited and forward it to friends","\u05D0\u05DD \u05E8\u05D5\u05D1 \u05D4\u05E9\u05D5\u05E7 \u05D7\u05D5\u05E9\u05D1 \u05D4\u05E4\u05D5\u05DA \u05DE\u05DE\u05E0\u05D9, \u05D0\u05E0\u05D9 \u05D1\u05D3\u05E8\u05DA \u05DB\u05DC\u05DC \u05DE\u05D5\u05D5\u05EA\u05E8 \u05E2\u05DC \u05D4\u05E2\u05DE\u05D3\u05D4 \u05E9\u05DC\u05D9 \u05D5\u05DE\u05EA\u05D9\u05D9\u05E9\u05E8 \u05D0\u05D9\u05EA\u05D5.":"If most of the market thinks the opposite of me, I usually give up my position and align with it.","\u05D4\u05D9\u05E6\u05DE\u05D3\u05D5\u05EA \u05DC\u05DE\u05D7\u05D9\u05E8 \u05D4\u05DB\u05E0\u05D9\u05E1\u05D4":"Anchoring to the entry price","\u05D4\u05DE\u05D7\u05D9\u05E8 \u05D9\u05E8\u05D3 \u05DE\u05EA\u05D7\u05EA \u05DC\u05DB\u05E0\u05D9\u05E1\u05D4 \u05E9\u05DC\u05DA. \u05DB\u05DE\u05D4 \u05D6\u05D4 \u05DE\u05E9\u05E4\u05D9\u05E2 \u05E2\u05DC \u05D4\u05D4\u05D7\u05DC\u05D8\u05D4 \u05D0\u05DD \u05DC\u05D4\u05D9\u05E9\u05D0\u05E8 \u05D1\u05E2\u05E1\u05E7\u05D4?":"Price dropped below your entry. How much does that affect the decision whether to stay in the trade?","\u05DC\u05D0 \u05DE\u05E9\u05E0\u05D4. \u05DE\u05D4 \u05E9\u05E7\u05D5\u05D1\u05E2 \u05D6\u05D4 \u05D0\u05DD \u05D4\u05EA\u05D6\u05D4 \u05E2\u05D3\u05D9\u05D9\u05DF \u05EA\u05E7\u05E4\u05D4":"It does not matter. What decides is whether the thesis still holds","\u05D0\u05E0\u05D9 \u05E8\u05D5\u05E6\u05D4 \u05DC\u05E4\u05D7\u05D5\u05EA \u05DC\u05D7\u05D6\u05D5\u05E8 \u05DC\u05E0\u05E7\u05D5\u05D3\u05EA \u05D4\u05DB\u05E0\u05D9\u05E1\u05D4 \u05DC\u05E4\u05E0\u05D9 \u05E9\u05D0\u05E6\u05D0":"I want at least to get back to my entry before I exit","\u05EA\u05DC\u05D5\u05D9 \u05DB\u05DE\u05D4 \u05DB\u05D1\u05E8 \u05D4\u05E4\u05E1\u05D3\u05EA\u05D9 \u05D1\u05E4\u05D5\u05E2\u05DC":"Depends on how much I have already lost","\u05D9\u05E9 \u05DC\u05D9 \u05EA\u05D5\u05DB\u05E0\u05D9\u05EA \u05DB\u05EA\u05D5\u05D1\u05D4 \u05E9\u05D0\u05E0\u05D9 \u05E4\u05D5\u05E2\u05DC \u05DC\u05E4\u05D9\u05D4 \u05D1\u05DB\u05DC \u05E2\u05E1\u05E7\u05D4.":"I have a written plan that I follow on every trade.",'\u05D1\u05E7\u05E8\u05EA \u05E7\u05E9\u05D1 \u2014 \u05E1\u05DE\u05DF \u05DB\u05D0\u05DF \u05D0\u05EA \u05D4\u05D0\u05E4\u05E9\u05E8\u05D5\u05EA "\u05D1\u05D4\u05D7\u05DC\u05D8 \u05DB\u05DF".':"Attention check \u2014 mark the \u201EDefinitely yes\u201D option here.","\u05DB\u05E9\u05E2\u05E1\u05E7\u05D4 \u05E7\u05D5\u05E8\u05D0\u05EA \u05DC\u05DA, \u05DE\u05D4 \u05DE\u05D5\u05E9\u05DA \u05D0\u05D5\u05EA\u05DA \u05D0\u05DC\u05D9\u05D4 \u05D4\u05DB\u05D9 \u05D7\u05D6\u05E7?":"When a trade calls to you, what pulls you to it most strongly?","\u05D0\u05D9\u05DF \u05DB\u05D0\u05DF \u05EA\u05E9\u05D5\u05D1\u05D4 \u05E0\u05DB\u05D5\u05E0\u05D4 \u2014 \u05E8\u05E7 \u05DE\u05D4 \u05E9\u05DE\u05EA\u05D0\u05E8 \u05D0\u05D5\u05EA\u05DA.":"There is no right answer here \u2014 only what describes you.","\u05D4\u05DE\u05E1\u05E4\u05E8\u05D9\u05DD \u05DE\u05E1\u05EA\u05D3\u05E8\u05D9\u05DD \u2014 \u05D9\u05E9 \u05DC\u05D9 \u05D4\u05D5\u05DB\u05D7\u05D4 \u05DC\u05E4\u05E0\u05D9 \u05E9\u05D0\u05E0\u05D9 \u05E0\u05DB\u05E0\u05E1":"The numbers add up \u2014 I have proof before I enter",'\u05EA\u05D7\u05D5\u05E9\u05EA \u05D1\u05D8\u05DF \u05D7\u05D6\u05E7\u05D4 \u05E9\u05D0\u05D5\u05DE\u05E8\u05EA \u05DC\u05D9 "\u05E2\u05DB\u05E9\u05D9\u05D5"':"A strong gut feeling telling me \u201Enow\u201D","\u05D9\u05E9 \u05EA\u05E0\u05D5\u05E2\u05D4 \u05D5\u05DE\u05D5\u05DE\u05E0\u05D8\u05D5\u05DD \u05E9\u05D0\u05E0\u05D9 \u05E8\u05D5\u05E6\u05D4 \u05DC\u05E8\u05DB\u05D5\u05D1 \u05E2\u05DC\u05D9\u05D5":"There is movement and momentum I want to ride","\u05DB\u05D5\u05DC\u05DD \u05D1\u05E6\u05D3 \u05D0\u05D7\u05D3 \u2014 \u05D5\u05D0\u05E0\u05D9 \u05E8\u05D5\u05D0\u05D4 \u05D0\u05EA \u05D4\u05E6\u05D3 \u05D4\u05E9\u05E0\u05D9":"Everyone is on one side \u2014 and I see the other","\u05D0\u05D9\u05D6\u05D4 \u05D9\u05D5\u05DD \u05DE\u05E1\u05D7\u05E8 \u05DE\u05E8\u05D2\u05D9\u05E9 \u05DC\u05DA \u05E0\u05DB\u05D5\u05DF?":"Which trading day feels right to you?","\u05D0\u05D9\u05DF \u05E0\u05DB\u05D5\u05DF \u05D5\u05DC\u05D0 \u05E0\u05DB\u05D5\u05DF \u2014 \u05DE\u05D4 \u05D4\u05DB\u05D9 \u05D0\u05EA\u05D4?":"There is no right or wrong \u2014 which is most you?","\u05DB\u05DE\u05D4 \u05E2\u05E1\u05E7\u05D0\u05D5\u05EA \u05E0\u05D1\u05D7\u05E8\u05D5\u05EA \u05D1\u05E7\u05E4\u05D9\u05D3\u05D4, \u05D5\u05D6\u05D4\u05D5":"A few carefully chosen trades, and that is it","\u05D4\u05E8\u05D1\u05D4 \u05E2\u05E1\u05E7\u05D0\u05D5\u05EA \u05E7\u05D8\u05E0\u05D5\u05EA \u05D5\u05D6\u05E8\u05D9\u05D6\u05D5\u05EA":"Many small, quick trades","\u05E2\u05E1\u05E7\u05D4 \u05D0\u05D7\u05EA \u05D2\u05D3\u05D5\u05DC\u05D4 \u05E9\u05D0\u05E0\u05D9 \u05DE\u05D7\u05D6\u05D9\u05E7 \u05DC\u05D0\u05D5\u05E8\u05DA":"One big trade I hold for a while","\u05D1\u05E2\u05D9\u05E7\u05E8 \u05DC\u05E6\u05E4\u05D5\u05EA, \u05D5\u05DC\u05E4\u05E2\u05D5\u05DC \u05E8\u05E7 \u05DB\u05E9\u05D6\u05D4 \u05E6\u05D5\u05E2\u05E7 \u05D0\u05DC\u05D9\u05D9":"Mostly to watch, and act only when it screams at me","\u05DE\u05D4 \u05D4\u05DB\u05D9 \u05DE\u05D5\u05E9\u05DA \u05D0\u05D5\u05EA\u05DA \u05D1\u05DE\u05E1\u05D7\u05E8 \u05E2\u05E6\u05DE\u05D5?":"What attracts you most about trading itself?","\u05EA\u05D1\u05D7\u05E8 \u05D0\u05EA \u05DE\u05D4 \u05E9\u05D1\u05D0\u05DE\u05EA \u05DE\u05D3\u05D1\u05E8 \u05D0\u05DC\u05D9\u05DA.":"Pick what truly speaks to you.","\u05DC\u05E9\u05DB\u05DC\u05DC \u05E9\u05D9\u05D8\u05D4 \u05D5\u05DC\u05D4\u05E9\u05EA\u05E4\u05E8 \u05D1\u05DC\u05D9 \u05E1\u05D5\u05E3":"Refining a method and improving endlessly","\u05D4\u05D7\u05D5\u05E4\u05E9 \u2014 \u05DC\u05D0 \u05DC\u05EA\u05EA \u05DC\u05D0\u05E3 \u05D0\u05D7\u05D3 \u05E4\u05E7\u05D5\u05D3\u05D5\u05EA \u05E2\u05DC\u05D9\u05D9":"The freedom \u2014 having no one give me orders","\u05D4\u05E0\u05D9\u05E6\u05D7\u05D5\u05DF, \u05DC\u05D4\u05D5\u05DB\u05D9\u05D7 \u05DC\u05E2\u05E6\u05DE\u05D9 \u05E9\u05E6\u05D3\u05E7\u05EA\u05D9":"The win, proving to myself I was right","\u05DC\u05D1\u05E0\u05D5\u05EA \u05D1\u05D9\u05D8\u05D7\u05D5\u05DF \u05DB\u05DC\u05DB\u05DC\u05D9 \u05E9\u05E7\u05D8 \u05D5\u05D9\u05E6\u05D9\u05D1":"Building quiet, stable financial security","\u05D0\u05D9\u05D6\u05D4 \u05E8\u05D5\u05D5\u05D7 \u05E0\u05D5\u05EA\u05DF \u05DC\u05DA \u05D4\u05DB\u05D9 \u05D4\u05E8\u05D1\u05D4 \u05E1\u05D9\u05E4\u05D5\u05E7?":"Which kind of profit gives you the most satisfaction?","\u05D0\u05D9\u05DF \u05DB\u05D0\u05DF \u05EA\u05E9\u05D5\u05D1\u05D4 \u05E0\u05DB\u05D5\u05E0\u05D4.":"There is no right answer here.","\u05E8\u05D5\u05D5\u05D7 \u05DE\u05D3\u05D5\u05D9\u05E7, \u05D1\u05D3\u05D9\u05D5\u05E7 \u05DC\u05E4\u05D9 \u05D4\u05EA\u05D5\u05DB\u05E0\u05D9\u05EA":"A precise profit, exactly by the plan","\u05E8\u05D5\u05D5\u05D7 \u05D2\u05D3\u05D5\u05DC \u05D5\u05D0\u05D2\u05E8\u05E1\u05D9\u05D1\u05D9 \u05E9\u05DE\u05E8\u05D2\u05D9\u05E9 \u05D1\u05D2\u05D5\u05E3":"A big, aggressive profit you feel in your body","\u05E8\u05D5\u05D5\u05D7 \u05E9\u05D4\u05D2\u05D9\u05E2 \u05D0\u05D7\u05E8\u05D9 \u05D4\u05DE\u05EA\u05E0\u05D4 \u05D0\u05E8\u05D5\u05DB\u05D4 \u05D5\u05E1\u05D1\u05DC\u05E0\u05D9\u05EA":"A profit that came after a long, patient wait","\u05E8\u05D5\u05D5\u05D7 \u05DB\u05E9\u05DB\u05DC \u05D4\u05E9\u05D5\u05E7 \u05D7\u05E9\u05D1 \u05D4\u05E4\u05D5\u05DA \u05DE\u05DE\u05E0\u05D9":"A profit when the whole market thought the opposite of me","\u05E2\u05E1\u05E7\u05D4 \u05E9\u05D0\u05EA\u05D4 \u05D2\u05D0\u05D4 \u05D1\u05D4 \u2014 \u05DE\u05D4 \u05D2\u05E8\u05DD \u05DC\u05D2\u05D0\u05D5\u05D5\u05D4 \u05D4\u05DB\u05D9 \u05D4\u05E8\u05D1\u05D4?":"A trade you are proud of \u2014 what caused the pride most?","\u05DB\u05DC \u05D4\u05EA\u05E9\u05D5\u05D1\u05D5\u05EA \u05D8\u05D5\u05D1\u05D5\u05EA. \u05EA\u05D1\u05D7\u05E8 \u05D0\u05EA \u05DE\u05D4 \u05E9\u05D4\u05DB\u05D9 \u05D0\u05EA\u05D4.":"All answers are good. Pick what is most you.","\u05E9\u05D6\u05D9\u05D4\u05D9\u05EA\u05D9 \u05D4\u05D6\u05D3\u05DE\u05E0\u05D5\u05EA \u05E9\u05D0\u05D7\u05E8\u05D9\u05DD \u05E4\u05E1\u05E4\u05E1\u05 \u05D6\u05D5 \u05EA\u05D3\u05D9\u05E8\u05D5\u05EA \u05D0\u05EA\u05D4 \u05DE\u05EA\u05E2\u05D3 \u05D5\u05DE\u05E0\u05EA\u05D7 \u05D0\u05EA \u05D4\u05E2\u05E1\u05E7\u05D0\u05D5\u05EA \u05E9\u05DC\u05DA \u05D1\u05D9\u05D5\u05DE\u05DF \u05DE\u05E1\u05D7\u05E8?":"How often do you log and review your trades in a trading journal?","\u05DB\u05DC \u05E2\u05E1\u05E7\u05D4 \u2014 \u05DB\u05E0\u05D9\u05E1\u05D4, \u05D9\u05E6\u05D9\u05D0\u05D4, \u05E1\u05D9\u05D1\u05D4 \u05D5\u05DE\u05D4 \u05D4\u05E8\u05D2\u05E9\u05EA\u05D9":"Every trade \u2014 entry, exit, reason, and how I felt","\u05DE\u05D3\u05D9 \u05E4\u05E2\u05DD, \u05DB\u05E9\u05D0\u05E0\u05D9 \u05E0\u05D6\u05DB\u05E8":"Occasionally, when I remember","\u05DB\u05DE\u05E2\u05D8 \u05D0\u05E3 \u05E4\u05E2\u05DD":"Almost never","\u05D0\u05E0\u05D9 \u05DE\u05EA\u05E2\u05D3 \u05DB\u05DC \u05E2\u05E1\u05E7\u05D4 \u05E9\u05DC\u05D9 \u05D1\u05D9\u05D5\u05DE\u05DF, \u05D1\u05DC\u05D9 \u05D9\u05D5\u05E6\u05D0 \u05DE\u05DF \u05D4\u05DB\u05DC\u05DC.":"I log every trade of mine in a journal, without exception.","\u05D1\u05D0\u05D9\u05D6\u05D4 \u05D0\u05D7\u05D5\u05D6 \u05DE\u05D4\u05E2\u05E1\u05E7\u05D0\u05D5\u05EA \u05D4\u05D5\u05E4\u05E2\u05DC\u05EA \u05D1\u05D4\u05E9\u05E4\u05E2\u05D4 \u05D9\u05E9\u05D9\u05E8\u05D4 \u05E9\u05DC \u05E4\u05D5\u05E1\u05D8/\u05D5\u05D9\u05D3\u05D0\u05D5/\u05D4\u05D5\u05D3\u05E2\u05D4 \u05E9\u05DC \u05DE\u05D9\u05E9\u05D4\u05D5 \u05D0\u05D7\u05E8?":"On what percentage of trades were you prompted by someone else\u2019s post/video/message?","\u05EA\u05D4\u05D9\u05D4 \u05D9\u05E9\u05E8 \u05E2\u05DD \u05E2\u05E6\u05DE\u05DA.":"Be honest with yourself.","\u05DE\u05D4\u05D5 \u05DE\u05E7\u05D5\u05E8 \u05D4\u05D0\u05D5\u05EA \u05D4\u05DB\u05D9 \u05D8\u05D5\u05D1 \u05DC\u05DB\u05E0\u05D9\u05E1\u05D4, \u05D1\u05E2\u05D9\u05E0\u05D9\u05DA?":"What is the best source of an entry signal, in your view?","\u05D4\u05E9\u05D9\u05D8\u05D4 \u05D5\u05D4\u05D0\u05E1\u05D8\u05E8\u05D8\u05D2\u05D9\u05D4 \u05E9\u05DC\u05D9 \u05D1\u05DC\u05D1\u05D3":"My method and strategy alone","\u05DE\u05D5\u05DE\u05D7\u05D4 / \u05E7\u05D1\u05D5\u05E6\u05D4 / \u05D2\u05D5\u05E8\u05D5 \u05E9\u05D0\u05E0\u05D9 \u05E1\u05D5\u05DE\u05DA \u05E2\u05DC\u05D9\u05D5":"An expert / group / guru I trust","\u05EA\u05D7\u05D5\u05E9\u05EA \u05D1\u05D8\u05DF \u05D1\u05E8\u05D2\u05E2 \u05D0\u05DE\u05EA":"A gut feeling at the moment of truth","\u05D0\u05D7\u05E8\u05D9 \u05D4\u05E4\u05E1\u05D3 \u05D2\u05D3\u05D5\u05DC \u2014 \u05D0\u05D9\u05DA \u05E0\u05E8\u05D0\u05D4 \u05D4\u05DC\u05D9\u05DC\u05D4 \u05E9\u05DC\u05DA?":"After a big loss \u2014 what does your night look like?","\u05D9\u05E9\u05DF \u05E8\u05D2\u05D9\u05DC. \u05D6\u05D4 \u05E8\u05E7 \u05DB\u05E1\u05E3":"Sleep normally. It is just money","\u05DE\u05EA\u05E7\u05E9\u05D4 \u05DC\u05D4\u05D9\u05E8\u05D3\u05DD, \u05D7\u05D5\u05D6\u05E8 \u05E2\u05DC \u05D6\u05D4 \u05D1\u05E8\u05D0\u05E9":"Struggle to fall asleep, replaying it in my head","\u05D9\u05E9\u05DF, \u05D0\u05D1\u05DC \u05E7\u05DD \u05DC\u05D4\u05E6\u05D9\u05E5 \u05D1\u05DE\u05D7\u05D9\u05E8":"Sleep, but get up to peek at the price","\u05DC\u05D0 \u05DE\u05DE\u05E9 \u05E0\u05EA\u05E7\u05DC\u05EA\u05D9 \u05D1\u05DE\u05E6\u05D1 \u05D4\u05D6\u05D4":"I have not really run into this situation","\u05D6\u05DE\u05DF \u05D4\u05EA\u05D0\u05D5\u05E9\u05E9\u05D5\u05EA \u05D0\u05D7\u05E8\u05D9 \u05D4\u05E4\u05E1\u05D3":"Recovery time after a loss","\u05D0\u05D7\u05E8\u05D9 \u05D4\u05E4\u05E1\u05D3 \u05D2\u05D3\u05D5\u05DC \u2014 \u05DB\u05DE\u05D4 \u05D6\u05DE\u05DF \u05DC\u05D5\u05E7\u05D7 \u05DC\u05DA \u05DC\u05D7\u05D6\u05D5\u05E8 \u05DC\u05E2\u05E6\u05DE\u05DA?":"After a big loss \u2014 how long does it take you to get back to yourself?","\u05D3\u05E7\u05D5\u05EA. \u05E1\u05D5\u05D2\u05E8, \u05E0\u05D5\u05E9\u05DD, \u05DE\u05DE\u05E9\u05D9\u05DA":"Minutes. Close, breathe, move on","\u05DB\u05DE\u05D4 \u05E9\u05E2\u05D5\u05EA":"A few hours","\u05D9\u05D5\u05DD \u05D0\u05D5 \u05D9\u05D5\u05EA\u05E8, \u05D6\u05D4 \u05E0\u05E9\u05D0\u05E8 \u05D0\u05D9\u05EA\u05D9":"A day or more, it stays with me","\u05DC\u05D0 \u05DE\u05D7\u05DB\u05D4 \u2014 \u05DE\u05DE\u05E9\u05D9\u05DA \u05DC\u05E1\u05D7\u05D5\u05E8 \u05D9\u05E9\u05E8 \u05D3\u05E8\u05DA \u05D6\u05D4":"I do not wait \u2014 I keep trading right through it","\u05D1\u05D9\u05D5\u05DD \u05D1\u05DC\u05D9 \u05E1\u05D8\u05D0\u05E4 \u05D1\u05E8\u05D5\u05E8 \u2014 \u05DE\u05D4 \u05D0\u05EA\u05D4 \u05E2\u05D5\u05E9\u05D4?":"On a day with no clear setup \u2014 what do you do?","\u05E7\u05DD, \u05E2\u05D5\u05E9\u05D4 \u05DE\u05E9\u05D4\u05D5 \u05D0\u05D7\u05E8, \u05D7\u05D5\u05D6\u05E8 \u05D0\u05DD \u05DE\u05E9\u05D4\u05D5 \u05DE\u05EA\u05E2\u05D5\u05E8\u05E8":"Get up, do something else, come back if something develops","\u05E0\u05E9\u05D0\u05E8 \u05E0\u05E2\u05D5\u05E5 \u05D1\u05DE\u05E1\u05DA \u05D5\u05DE\u05D7\u05E4\u05E9 \u05DE\u05E9\u05D4\u05D5 \u05DC\u05E1\u05D7\u05D5\u05E8":"Stay glued to the screen looking for something to trade","\u05E1\u05D5\u05D2\u05E8 \u05D4\u05DB\u05D5\u05DC \u05D5\u05DC\u05D0 \u05E4\u05D5\u05EA\u05D7 \u05E2\u05D3 \u05DE\u05D7\u05E8":"Close everything and do not open until tomorrow","\u05E1\u05D2\u05D9\u05E8\u05EA \u05D9\u05D5\u05DD \u05D4\u05DE\u05E1\u05D7\u05E8":"Closing the trading day","\u05E0\u05D2\u05DE\u05E8 \u05D9\u05D5\u05DD \u05D4\u05DE\u05E1\u05D7\u05E8. \u05DE\u05D4 \u05D0\u05EA\u05D4 \u05E2\u05D5\u05E9\u05D4 \u05DC\u05E4\u05E0\u05D9 \u05E9\u05D0\u05EA\u05D4 \u05E1\u05D5\u05D2\u05E8 \u05D0\u05EA \u05D4\u05DE\u05E1\u05DA?":"The trading day is over. What do you do before you close the screen?","\u05E2\u05D5\u05D1\u05E8 \u05E2\u05DC \u05D4\u05E2\u05E1\u05E7\u05D0\u05D5\u05EA, \u05DE\u05EA\u05E2\u05D3 \u05D5\u05DE\u05E1\u05DB\u05DD \u05DE\u05D4 \u05E2\u05D1\u05D3 \u05D5\u05DE\u05D4 \u05DC\u05D0":"Review the trades, journal and summarize what worked and what did not","\u05DE\u05E1\u05EA\u05DB\u05DC \u05E2\u05DC \u05D4\u05E8\u05D5\u05D5\u05D7/\u05D4\u05E4\u05E1\u05D3 \u05D4\u05D9\u05D5\u05DE\u05D9 \u05D5\u05D6\u05D4\u05D5":"Look at the daily P&L and that is it","\u05E4\u05E9\u05D5\u05D8 \u05E1\u05D5\u05D2\u05E8. \u05D4\u05D9\u05D5\u05DD \u05E0\u05D2\u05DE\u05E8":"Just close. The day is over","\u05DB\u05E9\u05D0\u05EA\u05D4 \u05DC\u05D0 \u05DC\u05D9\u05D3 \u05D4\u05DE\u05E1\u05DA \u2014 \u05DB\u05DC \u05DB\u05DE\u05D4 \u05D6\u05DE\u05DF \u05D0\u05EA\u05D4 \u05D1\u05D5\u05D3\u05E7 \u05DE\u05D7\u05D9\u05E8\u05D9\u05DD \u05D1\u05D8\u05DC\u05E4\u05D5\u05DF?":"When you are away from the screen \u2014 how often do you check prices on your phone?","\u05DB\u05DE\u05E2\u05D8 \u05DC\u05D0. \u05D9\u05E9 \u05DC\u05D9 \u05D4\u05EA\u05E8\u05D0\u05D5\u05EA \u05D5\u05D4\u05DB\u05D5\u05DC \u05DE\u05D5\u05D2\u05D3\u05E8":"Almost never. I have alerts and everything is set","\u05DB\u05DC \u05DB\u05DE\u05D4 \u05D3\u05E7\u05D5\u05EA. \u05E7\u05E9\u05D4 \u05DC\u05D9 \u05DC\u05E0\u05EA\u05E7":"Every few minutes. It is hard for me to detach","\u05DB\u05DE\u05E2\u05D8 \u05E9\u05DB\u05D7\u05EA\u05D9 \u05E9\u05D9\u05E9 \u05DC\u05D9 \u05E4\u05D5\u05D6\u05D9\u05E6\u05D9\u05D5\u05EA \u05E4\u05EA\u05D5\u05D7\u05D5\u05EA":"I almost forgot I have open positions",'\u05DE\u05D9\u05E9\u05D4\u05D5 \u05DE\u05E6\u05D9\u05D2 \u05DC\u05DA \u05D0\u05E1\u05D8\u05E8\u05D8\u05D2\u05D9\u05D4 \u05E2\u05DD "80% \u05D4\u05E6\u05DC\u05D7\u05D4". \u05DE\u05D4 \u05D4\u05E9\u05D0\u05DC\u05D4 \u05D4\u05E8\u05D0\u05E9\u05D5\u05E0\u05D4 \u05E9\u05DC\u05DA?':"Someone presents you a strategy with \u201E80% success.\u201D What is your first question?",'"\u05E2\u05DC \u05DB\u05DE\u05D4 \u05E2\u05E1\u05E7\u05D0\u05D5\u05EA \u05D6\u05D4 \u05E0\u05D1\u05D3\u05E7, \u05D5\u05D1\u05D0\u05D9\u05D6\u05D5 \u05EA\u05E7\u05D5\u05E4\u05D4?"':"\u201EOver how many trades was this tested, and over what period?\u201D",'"\u05DB\u05DE\u05D4 \u05DB\u05E1\u05E3 \u05D4\u05D5\u05D0 \u05E2\u05E9\u05D4 \u05E2\u05DD \u05D6\u05D4?"':"\u201EHow much money did he make with it?\u201D",'"\u05D0\u05D9\u05E4\u05D4 \u05E0\u05E8\u05E9\u05DE\u05D9\u05DD / \u05D0\u05D9\u05DA \u05DE\u05E7\u05D1\u05DC\u05D9\u05DD \u05D0\u05EA \u05D6\u05D4?"':"\u201EWhere do I sign up / how do I get it?\u201D",'"\u05E0\u05E9\u05DE\u05E2 \u05DE\u05E2\u05D5\u05DC\u05D4, \u05D0\u05D9\u05DA \u05DE\u05EA\u05D7\u05D9\u05DC\u05D9\u05DD?"':"\u201ESounds great, how do I start?\u201D","\u05D0\u05E0\u05D9 \u05D1\u05D5\u05D8\u05D7 \u05D1\u05E0\u05D9\u05EA\u05D5\u05D7 \u05E9\u05DC\u05D9 \u05D2\u05DD \u05DB\u05E9\u05DB\u05DC \u05D4\u05E9\u05D5\u05E7 \u05D7\u05D5\u05E9\u05D1 \u05D4\u05E4\u05D5\u05DA.":"I trust my analysis even when the whole market thinks the opposite.","\u05E0\u05E0\u05D9\u05D7 \u05E9\u05D0\u05EA\u05D4 \u05E1\u05D5\u05D7\u05E8 \u05DB\u05D1\u05E8 \u05E9\u05DC\u05D5\u05E9 \u05E9\u05E0\u05D9\u05DD \u05D5\u05E2\u05D3\u05D9\u05D9\u05DF \u05DC\u05D0 \u05E8\u05D5\u05D5\u05D7\u05D9 \u05D1\u05E2\u05E7\u05D1\u05D9\u05D5\u05EA. \u05D0\u05D9\u05D6\u05D5 \u05D0\u05DE\u05D9\u05E8\u05D4 \u05D4\u05DB\u05D9 \u05DB\u05E0\u05D4?":"Suppose you have traded for three years and are still not consistently profitable. Which statement is most honest?",'\u05D0\u05D9\u05DF \u05EA\u05E9\u05D5\u05D1\u05D4 "\u05E0\u05DB\u05D5\u05E0\u05D4". \u05D9\u05E9 \u05DB\u05E0\u05D4.':"There is no \u201Eright\u201D answer. There is an honest one.","\u05D0\u05E0\u05D9 \u05E7\u05E8\u05D5\u05D1 \u05DE\u05D0\u05D5\u05D3, \u05E6\u05E8\u05D9\u05DA \u05E8\u05E7 \u05E2\u05D5\u05D3 \u05E7\u05E6\u05EA":"I am very close, just need a bit more","\u05DB\u05E0\u05E8\u05D0\u05D4 \u05D7\u05E1\u05E8 \u05DC\u05D9 \u05EA\u05D4\u05DC\u05D9\u05DA/\u05D9\u05D5\u05DE\u05DF \u05DE\u05E1\u05D5\u05D3\u05E8, \u05D5\u05D0\u05E0\u05D9 \u05E6\u05E8\u05D9\u05DA \u05DC\u05D1\u05E0\u05D5\u05EA \u05D0\u05D5\u05EA\u05D5":"I probably lack an organized process/journal, and I need to build it","\u05D4\u05E9\u05D5\u05E7 \u05DE\u05E0\u05D9\u05E4\u05D5\u05DC\u05D8\u05D9\u05D1\u05D9, \u05D6\u05D4 \u05E7\u05E9\u05D4 \u05DC\u05DB\u05D5\u05DC\u05DD":"The market is manipulative, it is hard for everyone","\u05D0\u05E0\u05D9 \u05D1\u05E2\u05E6\u05DD \u05DB\u05DF \u05DE\u05E8\u05D5\u05D5\u05D9\u05D7, \u05E4\u05E9\u05D5\u05D8 \u05DC\u05D0 \u05E2\u05E7\u05D1\u05D9":"I actually do make money, just not consistently",'\u05EA\u05D7\u05D5\u05E9\u05EA "\u05DE\u05D2\u05D9\u05E2 \u05DC\u05D9" \u05D0\u05D7\u05E8\u05D9 \u05E8\u05E6\u05E3':"A feeling of being \u201Edue\u201D after a streak",'\u05D0\u05D7\u05E8\u05D9 \u05E9\u05DC\u05D5\u05E9\u05D4 \u05D4\u05E4\u05E1\u05D3\u05D9\u05DD \u05D1\u05E8\u05E6\u05E3, \u05D9\u05E9 \u05D1\u05D9 \u05EA\u05D7\u05D5\u05E9\u05D4 \u05E9\u05E2\u05DB\u05E9\u05D9\u05D5 \u05E0\u05D9\u05E6\u05D7\u05D5\u05DF \u05DB\u05D1\u05E8 "\u05DE\u05D2\u05D9\u05E2" \u05DC\u05D9.':"After three losses in a row, I feel that a win is now \u201Edue\u201D to me.","\u05D0\u05E0\u05D9 \u05D0\u05E3 \u05E4\u05E2\u05DD, \u05D1\u05E9\u05D5\u05DD \u05DE\u05E6\u05D1, \u05DC\u05D0 \u05E0\u05D5\u05EA\u05DF \u05DC\u05E8\u05D2\u05E9\u05D5\u05EA \u05DC\u05D4\u05E9\u05E4\u05D9\u05E2 \u05E2\u05DC \u05D4\u05DE\u05E1\u05D7\u05E8 \u05E9\u05DC\u05D9.":"I never, under any circumstances, let emotions affect my trading.","\u05D0\u05E0\u05D9 \u05DE\u05E8\u05D2\u05D9\u05E9 \u05D1\u05E0\u05D5\u05D7 \u05E2\u05DD \u05D0\u05D9-\u05D5\u05D3\u05D0\u05D5\u05EA \u2014 \u05E1\u05D9\u05DB\u05D5\u05DF \u05DC\u05D0 \u05DE\u05DC\u05D7\u05D9\u05E5 \u05D0\u05D5\u05EA\u05D9.":"I am comfortable with uncertainty \u2014 risk does not stress me.","\u05DB\u05E9\u05D0\u05E0\u05D9 \u05D1\u05D8\u05D5\u05D7 \u05D1\u05E2\u05E1\u05E7\u05D4, \u05D0\u05E0\u05D9 \u05E9\u05DD \u05E2\u05DC\u05D9\u05D4 \u05D4\u05E8\u05D1\u05D4 \u05D9\u05D5\u05EA\u05E8 \u05DE\u05D4\u05E8\u05D2\u05D9\u05DC.":"When I am sure of a trade, I put much more than usual on it.","\u05D0\u05E0\u05D9 \u05E0\u05D5\u05D8\u05D4 \u05DC\u05E6\u05D0\u05EA \u05DE\u05E2\u05E1\u05E7\u05D0\u05D5\u05EA \u05DE\u05D5\u05E7\u05D3\u05DD \u05DE\u05E4\u05D7\u05D3 \u05E9\u05D4\u05E8\u05D5\u05D5\u05D7 \u05D9\u05D9\u05E2\u05DC\u05DD.":"I tend to exit trades early out of fear the profit will vanish.","\u05D4\u05D6\u05D3\u05DE\u05E0\u05D5\u05EA \u05DE\u05E6\u05D5\u05D9\u05E0\u05EA \u2014 \u05D0\u05D1\u05DC \u05D4\u05D9\u05D0 \u05D3\u05D5\u05E8\u05E9\u05EA 4% \u05DE\u05D4\u05D7\u05E9\u05D1\u05D5\u05DF \u05D1\u05DE\u05E7\u05D5\u05DD \u05D4-1% \u05D4\u05E8\u05D2\u05D9\u05DC \u05E9\u05DC\u05DA.":"An excellent opportunity \u2014 but it requires 4% of the account instead of your usual 1%.","\u05E0\u05DB\u05E0\u05E1 \u05D1-1% \u05DB\u05DE\u05EA\u05D5\u05DB\u05E0\u05DF":"Enter at 1% as planned","\u05DE\u05D2\u05D3\u05D9\u05DC \u05DC-2%, \u05E4\u05E9\u05E8\u05D4":"Increase to 2%, a compromise","\u05D4\u05D5\u05DC\u05DA \u05E2\u05DC \u05DB\u05DC \u05D4-4%, \u05D4\u05D9\u05D0 \u05DE\u05D5\u05E9\u05DC\u05DE\u05EA":"Go for the full 4%, it is perfect","\u05DE\u05D5\u05D5\u05EA\u05E8, \u05DC\u05D0 \u05E9\u05D5\u05D5\u05D4 \u05DC\u05E9\u05D1\u05D5\u05E8 \u05DB\u05DC\u05DC":"Pass, not worth breaking a rule","\u05D0\u05EA\u05D4 \u200E+30% \u05D4\u05D7\u05D5\u05D3\u05E9. \u05D0\u05D9\u05DA \u05D6\u05D4 \u05DE\u05E9\u05E4\u05D9\u05E2 \u05E2\u05DC \u05D4\u05D2\u05D5\u05D3\u05DC \u05D1\u05E2\u05E1\u05E7\u05D4 \u05D4\u05D1\u05D0\u05D4?":"You are +30% this month. How does that affect the size on your next trade?","\u05D0\u05D5\u05EA\u05D5 \u05D2\u05D5\u05D3\u05DC \u05D1\u05D3\u05D9\u05D5\u05E7, \u05D4\u05E8\u05D5\u05D5\u05D7 \u05DC\u05D0 \u05DE\u05E9\u05E0\u05D4 \u05DB\u05DC\u05D5\u05DD":"Exactly the same size, the profit changes nothing","\u05DE\u05D2\u05D3\u05D9\u05DC \u2014 \u05D0\u05E0\u05D9 \u05DE\u05E9\u05D7\u05E7 \u05E2\u05DD \u201E\u05DB\u05E1\u05E3 \u05E9\u05DC \u05D4\u05D1\u05D9\u05EA\u201D":"Size up \u2014 I am playing with \u201Ehouse money\u201D","\u05DE\u05E7\u05D8\u05D9\u05DF, \u05E9\u05D5\u05DE\u05E8 \u05E2\u05DC \u05D4\u05E8\u05D5\u05D5\u05D7":"Reduce, protecting the profit","\u05DB\u05DE\u05D4 \u05DE\u05D9\u05E0\u05D5\u05E3 \u05D0\u05EA\u05D4 \u05DE\u05E8\u05D2\u05D9\u05E9 \u05D1\u05E0\u05D5\u05D7 \u05DC\u05D4\u05E4\u05E2\u05D9\u05DC?":"How much leverage are you comfortable using?","\u05D1\u05DC\u05D9, \u05D0\u05D5 \u05DE\u05D9\u05E0\u05D9\u05DE\u05DC\u05D9":"None, or minimal","\u05D1\u05D9\u05E0\u05D5\u05E0\u05D9 \u05D5\u05DE\u05D7\u05D5\u05E9\u05D1":"Moderate and calculated","\u05D2\u05D1\u05D5\u05D4 \u2014 \u05DB\u05DB\u05D4 \u05E2\u05D5\u05E9\u05D9\u05DD \u05EA\u05E9\u05D5\u05D0\u05D4 \u05D0\u05DE\u05D9\u05EA\u05D9\u05EA":"High \u2014 that is how you make real returns","\u05DC\u05E4\u05E0\u05D9 \u05DB\u05DC \u05E2\u05E1\u05E7\u05D4 \u05D0\u05E0\u05D9 \u05D9\u05D5\u05D3\u05E2 \u05DE\u05E8\u05D0\u05E9 \u05DB\u05E0\u05D9\u05E1\u05D4, \u05D9\u05E6\u05D9\u05D0\u05D4 \u05D5\u05D2\u05D5\u05D3\u05DC \u05E1\u05D9\u05DB\u05D5\u05DF.":"Before every trade I know in advance the entry, exit, and risk size.","\u05D4\u05E8\u05D1\u05D4 \u05E4\u05E2\u05DE\u05D9\u05DD \u05D0\u05E0\u05D9 \u05E0\u05DB\u05E0\u05E1 \u05DC\u05E2\u05E1\u05E7\u05D4 \u05D5\u05DE\u05D7\u05DC\u05D9\u05D8 \u05E2\u05DC \u05D4\u05D9\u05E6\u05D9\u05D0\u05D4 \u05E8\u05E7 \u05EA\u05D5\u05DA \u05DB\u05D3\u05D9.":"Many times I enter a trade and decide on the exit only on the fly.","\u05D0\u05E0\u05D9 \u05DE\u05EA\u05E2\u05D3 \u05D5\u05DE\u05E0\u05EA\u05D7 \u05D0\u05EA \u05D4\u05E2\u05E1\u05E7\u05D0\u05D5\u05EA \u05E9\u05DC\u05D9 \u05D1\u05D0\u05D5\u05E4\u05DF \u05E7\u05D1\u05D5\u05E2.":"I log and review my trades regularly.","\u05D0\u05D9\u05DF \u05DC\u05D9 \u05D1\u05D0\u05DE\u05EA \u05E9\u05D9\u05D8\u05D4 \u05DB\u05EA\u05D5\u05D1\u05D4 \u2014 \u05D6\u05D4 \u05D9\u05D5\u05EA\u05E8 \u05EA\u05D7\u05D5\u05E9\u05D4 \u05D5\u05D0\u05D9\u05E0\u05D8\u05D5\u05D0\u05D9\u05E6\u05D9\u05D4.":"I do not really have a written method \u2014 it is more feeling and intuition.","\u05DB\u05DE\u05D4 \u05E4\u05E2\u05DE\u05D9\u05DD \u05D1\u05D7\u05D5\u05D3\u05E9 \u05D0\u05EA\u05D4 \u05E2\u05D5\u05D1\u05E8 \u05D0\u05D7\u05D5\u05E8\u05D4 \u05E2\u05DC \u05D4\u05E2\u05E1\u05E7\u05D0\u05D5\u05EA \u05E9\u05DC\u05DA?":"How many times a month do you go back over your trades?","\u05D1\u05D0\u05D5\u05E4\u05DF
