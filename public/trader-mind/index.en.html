u05DE\u05D5\u05D7 \u05E0\u05EA\u05E7\u05E2 \u05D1\u05D3\u05D9\u05D5\u05E7 \u05DB\u05E9\u05E6\u05E8\u05D9\u05DA \u05DC\u05E4\u05E2\u05D5\u05DC. \u05D4\u05E4\u05EA\u05E8\u05D5\u05DF \u05D4\u05D5\u05D0 \u05DC\u05D0 \u201E\u05DC\u05D4\u05D7\u05DC\u05D9\u05D8 \u05DE\u05D4\u05E8\u201D, \u05D0\u05DC\u05D0 \u05E9\u05D4\u05E1\u05D8\u05D5\u05E4 \u05DB\u05D1\u05E8 \u05D9\u05D7\u05DC\u05D9\u05D8 \u05D1\u05E9\u05D1\u05D9\u05DC\u05DA.","That freeze is a silent enemy \u2014 with no decision made in advance, the mind locks up exactly when you need to act. The solution is not \u201Edecide faster,\u201D but to let the stop already decide for you.")}]},independence:{ask:r("\u05DC\u05E4\u05E0\u05D9 \u05E9\u05D4\u05D7\u05DC\u05D8\u05EA, \u05E8\u05D0\u05D9\u05EA\u05D9 \u05E9\u05D0\u05EA\u05D4 \u05E4\u05D5\u05E0\u05D4 \u05D4\u05D7\u05D5\u05E6\u05D4 \u2014 \u05D8\u05D5\u05D5\u05D9\u05D8\u05E8, \u05E7\u05D1\u05D5\u05E6\u05D4, \u05DE\u05D9\u05E9\u05D4\u05D5 \u05D0\u05D7\u05E8. \u05DE\u05D4 \u05D7\u05D9\u05E4\u05E9\u05EA \u05E9\u05DD?","Before you decided, I saw you turn outward \u2014 Twitter, a group, someone else. What were you looking for there?"),options:[{label:r("\u05D0\u05D9\u05E9\u05D5\u05E8 \u05E9\u05D0\u05E0\u05D9 \u05DC\u05D0 \u05D8\u05D5\u05E2\u05D4","Confirmation that I am not wrong"),reply:r("\u05D4\u05D7\u05D9\u05E4\u05D5\u05E9 \u05D0\u05D7\u05E8\u05D9 \u05D0\u05D9\u05E9\u05D5\u05E8 \u05D4\u05D5\u05D0 \u05DE\u05D4 \u05E9\u05D4\u05D5\u05E4\u05DA \u05D0\u05D5\u05EA\u05DA \u05DC\u05EA\u05DC\u05D5\u05D9. \u05D0\u05DD \u05D0\u05EA\u05D4 \u05E6\u05E8\u05D9\u05DA \u05E9\u05DE\u05D9\u05E9\u05D4\u05D5 \u05D9\u05E1\u05DB\u05D9\u05DD \u05DB\u05D3\u05D9 \u05DC\u05D4\u05D9\u05DB\u05E0\u05E1 \u2014 \u05D6\u05D5 \u05DB\u05D1\u05E8 \u05DC\u05D0 \u05D4\u05E2\u05E1\u05E7\u05D4 \u05E9\u05DC\u05DA, \u05D5\u05DB\u05E9\u05D4\u05D9\u05D0 \u05EA\u05D9\u05E4\u05D5\u05DC \u05DC\u05D0 \u05EA\u05D3\u05E2 \u05DC\u05DE\u05D4. \u05DB\u05EA\u05D5\u05D1 \u05D0\u05EA \u05D4\u05E1\u05D9\u05D1\u05D4 \u05E9\u05DC\u05DA \u05DC\u05E4\u05E0\u05D9 \u05E9\u05D0\u05EA\u05D4 \u05DE\u05E1\u05EA\u05DB\u05DC \u05D4\u05D7\u05D5\u05E6\u05D4.","Seeking confirmation is what makes you dependent. If you need someone to agree before you enter \u2014 it is no longer your trade, and when it falls you will not know why. Write your own reason before you look outward.")},{label:r("\u05E8\u05E2\u05D9\u05D5\u05E0\u05D5\u05EA, \u05D0\u05E0\u05D9 \u05DC\u05D0 \u05DE\u05DE\u05E6\u05D9\u05D0 \u05DC\u05D1\u05D3","Ideas \u2014 I do not come up with them alone"),reply:r("\u05DC\u05DC\u05DE\u05D5\u05D3 \u05DE\u05D0\u05D7\u05E8\u05D9\u05DD \u05D6\u05D4 \u05DE\u05E6\u05D5\u05D9\u05DF. \u05D4\u05E1\u05DB\u05E0\u05D4 \u05D4\u05D9\u05D0 \u05DC\u05D1\u05DC\u05D1\u05DC \u201E\u05E8\u05E2\u05D9\u05D5\u05DF\u201D \u05E2\u05DD \u201E\u05DB\u05E0\u05D9\u05E1\u05D4\u201D. \u05E7\u05D7 \u05D0\u05EA \u05D4\u05E8\u05E2\u05D9\u05D5\u05DF, \u05D0\u05D1\u05DC \u05D4\u05E2\u05D1\u05E8 \u05D0\u05D5\u05EA\u05D5 \u05D3\u05E8\u05DA \u05D4\u05E9\u05D9\u05D8\u05D4 \u05E9\u05DC\u05DA \u05DC\u05E4\u05E0\u05D9 \u05E9\u05E9\u05DD \u05E2\u05DC\u05D9\u05D5 \u05DB\u05E1\u05E3.","Learning from others is great. The danger is confusing \u201Ean idea\u201D with \u201Ean entry.\u201D Take the idea, but run it through your own system before you put money on it.")},{label:r("\u05E4\u05D7\u05D3 \u05DC\u05E4\u05E1\u05E4\u05E1 \u05DE\u05D4 \u05E9\u05DB\u05D5\u05DC\u05DD \u05E2\u05D5\u05E9\u05D9\u05DD","Fear of missing what everyone is doing"),reply:r("FOMO. \u05DB\u05E9\u05DB\u05D5\u05DC\u05DD \u05DB\u05D1\u05E8 \u05D1\u05E4\u05E0\u05D9\u05DD, \u05DC\u05E8\u05D5\u05D1 \u05D4\u05DE\u05D4\u05DC\u05DA \u05D4\u05D8\u05D5\u05D1 \u05DB\u05D1\u05E8 \u05E7\u05E8\u05D4. \u05D4\u05D4\u05D7\u05DC\u05D8\u05D5\u05EA \u05D4\u05DB\u05D9 \u05D8\u05D5\u05D1\u05D5\u05EA \u05E9\u05DC\u05DA \u05D9\u05D4\u05D9\u05D5 \u05D3\u05D5\u05D5\u05E7\u05D0 \u05D0\u05DC\u05D4 \u05E9\u05E2\u05E9\u05D9\u05EA \u05DC\u05D1\u05D3, \u05DC\u05E4\u05E0\u05D9 \u05D4\u05E8\u05E2\u05E9.","FOMO. When everyone is already in, the good move has usually already happened. Your best decisions will be exactly the ones you made alone, before the noise.")},{label:r("\u05DC\u05D0 \u05E9\u05DE\u05EA\u05D9 \u05DC\u05D1 \u05E9\u05D0\u05E0\u05D9 \u05E2\u05D5\u05E9\u05D4 \u05D0\u05EA \u05D6\u05D4","I did not notice I was doing it"),reply:r("\u05D5\u05D6\u05D4 \u05D1\u05D3\u05D9\u05D5\u05E7 \u05D4\u05E2\u05E0\u05D9\u05D9\u05DF \u2014 \u05D4\u05D9\u05D3 \u05D4\u05D7\u05D9\u05E6\u05D5\u05E0\u05D9\u05EA \u05DE\u05E0\u05D4\u05DC\u05EA \u05D0\u05D5\u05EA\u05DA \u05D1\u05DC\u05D9 \u05E9\u05EA\u05E8\u05D2\u05D9\u05E9. \u05E2\u05DB\u05E9\u05D9\u05D5, \u05DC\u05E4\u05E0\u05D9 \u05DB\u05DC \u05E2\u05E1\u05E7\u05D4: \u201E\u05D6\u05D4 \u05D0\u05E0\u05D9, \u05D0\u05D5 \u05DE\u05D9\u05E9\u05D4\u05D5 \u05D0\u05D7\u05E8 \u05DE\u05D3\u05D1\u05E8?\u201D","And that is exactly the point \u2014 the outside hand runs you without you feeling it. Now, before every trade: \u201EIs this me, or is someone else talking?\u201D")}]},emotion:{ask:r("\u05D0\u05D7\u05E8\u05D9 \u05D4\u05E4\u05E1\u05D3, \u05E8\u05D0\u05D9\u05EA\u05D9 \u05E1\u05D9\u05DE\u05E0\u05D9\u05DD \u05E9\u05D0\u05EA\u05D4 \u05DC\u05D0 \u05D1\u05D0\u05DE\u05EA \u05DE\u05E8\u05E4\u05D4. \u05DE\u05D4 \u05E7\u05D5\u05E8\u05D4 \u05DC\u05DA \u05D1\u05E4\u05E0\u05D9\u05DD \u05D0\u05D7\u05E8\u05D9 \u05E2\u05E1\u05E7\u05D4 \u05DE\u05E4\u05E1\u05D9\u05D3\u05D4?","After a loss, I saw signs that you do not really let go. What happens inside you after a losing trade?"),options:[{label:r("\u05D0\u05E0\u05D9 \u05D7\u05D9\u05D9\u05D1 \u05DC\u05D4\u05D7\u05D6\u05D9\u05E8 \u05DE\u05D9\u05D3","I have to win it back right away"),reply:r("\u05D6\u05D4 \u05DE\u05E1\u05D7\u05E8 \u05E0\u05E7\u05DE\u05D4, \u05D5\u05D4\u05D5\u05D0 \u05E9\u05D5\u05E8\u05E3 \u05D7\u05E9\u05D1\u05D5\u05E0\u05D5\u05EA. \u05D4\u05D4\u05E4\u05E1\u05D3 \u05D4\u05D1\u05D0 \u05DC\u05D0 \u05D1\u05D0 \u05DE\u05D4\u05E9\u05D5\u05E7 \u2014 \u05D4\u05D5\u05D0 \u05D1\u05D0 \u05DE\u05D4\u05E8\u05E6\u05D5\u05DF \u201E\u05DC\u05D4\u05D7\u05D6\u05D9\u05E8\u201D. \u05DB\u05DC\u05DC \u05D1\u05E8\u05D6\u05DC: \u05D0\u05D7\u05E8\u05D9 \u05D4\u05E4\u05E1\u05D3, 10 \u05D3\u05E7\u05D5\u05EA \u05DE\u05D7\u05D5\u05E5 \u05DC\u05DE\u05E1\u05DA.","That is revenge trading, and it burns accounts. The next loss does not come from the market \u2014 it comes from the urge to \u201Ewin it back.\u201D Iron rule: after a loss, 10 minutes off the screen.")},{label:r("\u05D6\u05D4 \u05DE\u05E7\u05E4\u05D9\u05D0 \u05D0\u05D5\u05EA\u05D9 \u05DC\u05E9\u05E2\u05D5\u05EA","It freezes me for hours"),reply:r("\u05D4\u05D4\u05E4\u05E1\u05D3 \u05E0\u05E9\u05D0\u05E8 \u05D0\u05D9\u05EA\u05DA \u05D4\u05E8\u05D1\u05D4 \u05D0\u05D7\u05E8\u05D9 \u05E9\u05E1\u05D2\u05E8\u05EA \u2014 \u05E1\u05D9\u05DE\u05DF \u05E9\u05D0\u05EA\u05D4 \u05DC\u05D5\u05E7\u05D7 \u05D0\u05EA \u05D6\u05D4 \u05D0\u05D9\u05E9\u05D9\u05EA. \u05E2\u05E1\u05E7\u05D4 \u05D4\u05D9\u05D0 \u05DC\u05D0 \u05D0\u05EA\u05D4, \u05D4\u05D9\u05D0 \u05E8\u05E7 \u05E2\u05D5\u05D3 \u05E9\u05D5\u05E8\u05D4 \u05D1\u05D8\u05D1\u05DC\u05D4. \u05D9\u05D5\u05DE\u05DF \u05E2\u05D5\u05D6\u05E8 \u05DC\u05D4\u05D5\u05E6\u05D9\u05D0 \u05D0\u05EA \u05D6\u05D4 \u05D4\u05D7\u05D5\u05E6\u05D4 \u05DE\u05D4\u05E8\u05D0\u05E9.","The loss stays with you long after you closed \u2014 a sign you take it personally. A trade is not you, it is just another row in a table. A journal helps get it out of your head.")},{label:r("\u05D0\u05E0\u05D9 \u05DE\u05D0\u05E9\u05D9\u05DD \u05D0\u05EA \u05D4\u05E9\u05D5\u05E7","I blame the market"),reply:r("\u05DB\u05DC \u05E2\u05D5\u05D3 \u05D6\u05D5 \u201E\u05D0\u05E9\u05DE\u05EA \u05D4\u05E9\u05D5\u05E7\u201D, \u05D0\u05D9\u05DF \u05DE\u05D4 \u05DC\u05DC\u05DE\u05D5\u05D3. \u05D4\u05DB\u05D5\u05D7 \u05D7\u05D5\u05D6\u05E8 \u05D0\u05DC\u05D9\u05DA \u05D1\u05E8\u05D2\u05E2 \u05E9\u05D0\u05EA\u05D4 \u05E9\u05D5\u05D0\u05DC \u201E\u05DE\u05D4 \u05D0\u05E0\u05D9 \u05D9\u05DB\u05D5\u05DC\u05EA\u05D9 \u05DC\u05E2\u05E9\u05D5\u05EA \u05D0\u05D7\u05E8\u05EA?\u201D \u2014 \u05D2\u05DD \u05DB\u05E9\u05D1\u05D0\u05DE\u05EA \u05DC\u05D0 \u05D4\u05D9\u05D9\u05EA \u05D0\u05E9\u05DD.","As long as it is \u201Ethe market\u2019s fault,\u201D there is nothing to learn. The power returns to you the moment you ask \u201Ewhat could I have done differently?\u201D \u2014 even when you truly were not at fault.")},{label:r("\u05D3\u05D5\u05D5\u05E7\u05D0 \u05E8\u05D2\u05D5\u05E2, \u05DE\u05DE\u05E9\u05D9\u05DA \u05D4\u05DC\u05D0\u05D4","Actually calm, I move on"),reply:r("\u05D0\u05DD \u05D6\u05D4 \u05D0\u05DE\u05D9\u05EA\u05D9 \u2014 \u05E0\u05DB\u05E1 \u05E0\u05D3\u05D9\u05E8. \u05E8\u05E7 \u05D1\u05D3\u05D5\u05E7 \u05E9\u05D6\u05D4 \u05DC\u05D0 \u05E8\u05D5\u05D2\u05E2 \u05E9\u05DE\u05E1\u05EA\u05D9\u05E8 \u05D4\u05D3\u05D7\u05E7\u05D4: \u05D4\u05D0\u05DD \u05D4\u05E2\u05E1\u05E7\u05D4 \u05D4\u05D1\u05D0\u05D4 \u05E9\u05DC\u05DA \u05D0\u05D7\u05E8\u05D9 \u05D4\u05E4\u05E1\u05D3 \u05E0\u05E8\u05D0\u05D9\u05EA \u05DB\u05DE\u05D5 \u05DB\u05DC \u05E2\u05E1\u05E7\u05D4, \u05D0\u05D5 \u05D2\u05D3\u05D5\u05DC\u05D4 \u05D9\u05D5\u05EA\u05E8?","If it is real \u2014 a rare asset. Just check it is not calm hiding suppression: does your next trade after a loss look like any other, or bigger?")}]},patience:{ask:r("\u05E8\u05D0\u05D9\u05EA\u05D9 \u05E9\u05E7\u05E9\u05D4 \u05DC\u05DA \u05DC\u05D7\u05DB\u05D5\u05EA \u2014 \u05D1\u05D9\u05DF \u05DC\u05DB\u05E0\u05D9\u05E1\u05D4 \u05D5\u05D1\u05D9\u05DF \u05DC\u05D4\u05D7\u05D6\u05D9\u05E7 \u05DE\u05E0\u05E6\u05D7\u05EA. \u05DE\u05D4 \u05D3\u05D5\u05D7\u05E3 \u05D0\u05D5\u05EA\u05DA \u05DC\u05E4\u05E2\u05D5\u05DC?","I saw it is hard for you to wait \u2014 both to enter and to hold a winner. What pushes you to act?"),options:[{label:r("\u05E4\u05D7\u05D3 \u05DC\u05E4\u05E1\u05E4\u05E1 \u05D4\u05D6\u05D3\u05DE\u05E0\u05D5\u05EA","Fear of missing an opportunity"),reply:r("\u05E8\u05D5\u05D1 \u05DE\u05D4 \u05E9\u05E0\u05E8\u05D0\u05D4 \u05DB\u05DE\u05D5 \u201E\u05D4\u05D6\u05D3\u05DE\u05E0\u05D5\u05EA \u05D0\u05D7\u05E8\u05D5\u05E0\u05D4\u201D \u05D4\u05D5\u05D0 \u05E8\u05E2\u05E9. \u05D4\u05D4\u05D6\u05D3\u05DE\u05E0\u05D5\u05D9\u05D5\u05EA \u05D4\u05D0\u05DE\u05D9\u05EA\u05D9\u05D5\u05EA \u05D7\u05D5\u05D6\u05E8\u05D5\u05EA. \u05E1\u05D1\u05DC\u05E0\u05D5\u05EA \u05D4\u05D9\u05D0 \u05DC\u05D7\u05DB\u05D5\u05EA \u05DC\u05E8\u05D2\u05E2 \u05E9\u05D1\u05D5 \u05D4\u05D4\u05E1\u05EA\u05D1\u05E8\u05D5\u05EA \u05DC\u05D8\u05D5\u05D1\u05EA\u05DA.","Most of what looks like a \u201Elast chance\u201D is noise. Real opportunities come back. Patience is waiting for the moment the probability is in your favor.")},{label:r("\u05DE\u05E9\u05E2\u05DE\u05DD \u05DC\u05D9 \u05DC\u05E9\u05D1\u05EA \u05D1\u05DC\u05D9 \u05E2\u05E1\u05E7\u05D4","I get bored sitting without a trade"),reply:r("\u05E9\u05E2\u05DE\u05D5\u05DD \u05D4\u05D5\u05D0 \u05DE\u05D0\u05D5\u05D9\u05D1\u05D9 \u05D4\u05E1\u05D5\u05D7\u05E8 \u05D4\u05D2\u05D3\u05D5\u05DC\u05D9\u05DD. \u05E2\u05E1\u05E7\u05D4 \u05DE\u05EA\u05D5\u05DA \u05E9\u05E2\u05DE\u05D5\u05DD \u05D4\u05D9\u05D0 \u05DB\u05DE\u05E2\u05D8 \u05EA\u05DE\u05D9\u05D3 \u05D2\u05E8\u05D5\u05E2\u05D4. \u05DE\u05E6\u05D0 \u05D1\u05DE\u05D4 \u05DC\u05DE\u05DC\u05D0 \u05D0\u05EA \u05D4\u05D6\u05DE\u05DF \u2014 \u05DE\u05D7\u05E7\u05E8, \u05D9\u05D5\u05DE\u05DF \u2014 \u05E9\u05DC\u05D0 \u05EA\u05D4\u05D9\u05D4 \u201E\u05D7\u05D9\u05D9\u05D1 \u05DC\u05E4\u05E2\u05D5\u05DC\u201D.","Boredom is one of a trader\u2019s great enemies. A trade out of boredom is almost always bad. Find something to fill the time \u2014 research, journaling \u2014 so you are not \u201Eforced to act.\u201D")},{label:r("\u05D0\u05E0\u05D9 \u05DE\u05DE\u05D4\u05E8 \u05DC\u05E0\u05E2\u05D5\u05DC \u05E8\u05D5\u05D5\u05D7","I rush to lock in profit"),reply:r("\u05D4\u05E4\u05D7\u05D3 \u05E9\u05D4\u05E8\u05D5\u05D5\u05D7 \u05D9\u05D9\u05E2\u05DC\u05DD \u05D2\u05D5\u05E8\u05DD \u05DC\u05DA \u05DC\u05D7\u05EA\u05D5\u05DA \u05DE\u05E0\u05E6\u05D7\u05D5\u05EA \u05DE\u05D5\u05E7\u05D3\u05DD \u2014 \u05D5\u05D6\u05D4 \u05E9\u05D5\u05D1\u05E8 \u05D0\u05EA \u05D9\u05D7\u05E1 \u05D4\u05E8\u05D5\u05D5\u05D7/\u05D4\u05E4\u05E1\u05D3. \u05EA\u05DF \u05DC\u05DE\u05E0\u05E6\u05D7\u05EA \u05DC\u05E8\u05D5\u05E5 \u05DC\u05E4\u05D9 \u05EA\u05D5\u05DB\u05E0\u05D9\u05EA, \u05DC\u05D0 \u05DC\u05E4\u05D9 \u05E4\u05D7\u05D3.","The fear that profit will vanish makes you cut winners early \u2014 and that breaks your win/loss ratio. Let the winner run by plan, not by fear.")},{label:r("\u05D0\u05E0\u05D9 \u05D1\u05E2\u05E6\u05DD \u05E1\u05D1\u05DC\u05DF, \u05D6\u05D4 \u05DC\u05D0 \u05D0\u05E0\u05D9","I am actually patient, this is not me"),reply:r("\u05D0\u05D5\u05DC\u05D9 \u05D4\u05DE\u05D3\u05D9\u05D3\u05D4 \u05EA\u05E4\u05E1\u05D4 \u05E8\u05D2\u05E2 \u05DE\u05E1\u05D5\u05D9\u05DD. \u05D0\u05D1\u05DC \u05D1\u05D3\u05D5\u05E7: \u05DB\u05DE\u05D4 \u05E2\u05E1\u05E7\u05D0\u05D5\u05EA \u05D1\u05E9\u05D1\u05D5\u05E2 \u05D0\u05EA\u05D4 \u05E2\u05D5\u05E9\u05D4 \u05DE\u05EA\u05D5\u05DA \u05E1\u05D8\u05D0\u05E4 \u05DE\u05DC\u05D0, \u05D5\u05DB\u05DE\u05D4 \u201E\u05DB\u05D9 \u05D4\u05D9\u05D4 \u05DC\u05D9 \u05D6\u05DE\u05DF\u201D?","Maybe the measurement caught a particular moment. But check: how many trades a week do you take from a full setup, and how many \u201Ebecause I had time\u201D?")}]},flexibility:{ask:r("\u05DB\u05E9\u05D4\u05EA\u05D6\u05D4 \u05E9\u05DC\u05DA \u05E0\u05E1\u05D3\u05E7\u05D4, \u05E0\u05D8\u05D9\u05EA \u05DC\u05D4\u05D9\u05D0\u05D7\u05D6 \u05D5\u05DC\u05D0 \u05DC\u05D4\u05E1\u05EA\u05D5\u05D1\u05D1. \u05DE\u05D4 \u05DE\u05D7\u05D6\u05D9\u05E7 \u05D0\u05D5\u05EA\u05DA \u05D1\u05E2\u05DE\u05D3\u05D4?","When your thesis cracked, you tended to hold on rather than turn. What keeps you in the position?"),options:[{label:r("\u05D4\u05E9\u05E7\u05E2\u05EA\u05D9 \u05D1\u05D6\u05D4, \u05D7\u05D1\u05DC \u05DC\u05D5\u05D5\u05EA\u05E8","I invested in it, a shame to give up"),reply:r("\u05D6\u05D5 \u05E2\u05DC\u05D5\u05EA \u05E9\u05E7\u05D5\u05E2\u05D4 \u2014 \u05DE\u05D4 \u05E9\u05DB\u05D1\u05E8 \u05D4\u05D5\u05E9\u05E7\u05E2 \u05DC\u05D0 \u05E6\u05E8\u05D9\u05DA \u05DC\u05D4\u05E9\u05E4\u05D9\u05E2 \u05E2\u05DC \u05D4\u05D4\u05D7\u05DC\u05D8\u05D4 \u05D4\u05D1\u05D0\u05D4. \u05D4\u05E9\u05D0\u05DC\u05D4 \u05D4\u05D9\u05D7\u05D9\u05D3\u05D4: \u201E\u05D0\u05DD \u05D4\u05D9\u05D9\u05EA\u05D9 \u05E0\u05DB\u05E0\u05E1 \u05E2\u05DB\u05E9\u05D9\u05D5, \u05D4\u05D9\u05D9\u05EA\u05D9 \u05E0\u05DB\u05E0\u05E1?\u201D \u05D0\u05DD \u05DC\u05D0 \u2014 \u05E6\u05D0.","That is sunk cost \u2014 what is already invested should not affect the next decision. The only question: \u201EIf I were entering now, would I enter?\u201D If not \u2014 exit.")},{label:r("\u05DC\u05D0 \u05D0\u05D5\u05D4\u05D1 \u05DC\u05D4\u05D5\u05D3\u05D5\u05EA \u05E9\u05D8\u05E2\u05D9\u05EA\u05D9","I do not like admitting I was wrong"),reply:r("\u05D4\u05D0\u05D2\u05D5 \u05D9\u05E7\u05E8 \u05D1\u05DE\u05E1\u05D7\u05E8. \u201E\u05D8\u05E2\u05D9\u05EA\u05D9\u201D \u05D4\u05D9\u05D0 \u05DC\u05D0 \u05D1\u05D5\u05E9\u05D4 \u2014 \u05D4\u05D9\u05D0 \u05D4\u05D4\u05D7\u05DC\u05D8\u05D4 \u05D4\u05DB\u05D9 \u05E8\u05D5\u05D5\u05D7\u05D9\u05EA \u05E9\u05EA\u05E2\u05E9\u05D4. \u05D4\u05D8\u05D5\u05D1\u05D9\u05DD \u05D8\u05D5\u05E2\u05D9\u05DD \u05D4\u05E8\u05D1\u05D4, \u05D4\u05DD \u05E4\u05E9\u05D5\u05D8 \u05D9\u05D5\u05E6\u05D0\u05D9\u05DD \u05DE\u05D4\u05E8.","Ego is expensive in trading. \u201EI was wrong\u201D is not shame \u2014 it is the most profitable decision you will make. The good ones are wrong often, they just exit fast.")},{label:r("\u05D1\u05D8\u05D5\u05D7 \u05E9\u05D6\u05D4 \u05E2\u05D5\u05D3 \u05D9\u05EA\u05D4\u05E4\u05DA","Sure it will still turn around"),reply:r("\u201E\u05D1\u05D8\u05D5\u05D7\u201D \u05DE\u05D5\u05DC \u05E0\u05EA\u05D5\u05E0\u05D9\u05DD \u05E9\u05E1\u05D5\u05EA\u05E8\u05D9\u05DD \u05D6\u05D5 \u05E2\u05E7\u05E9\u05E0\u05D5\u05EA, \u05DC\u05D0 \u05D1\u05D9\u05D8\u05D7\u05D5\u05DF. \u05EA\u05DF \u05DC\u05EA\u05D6\u05D4 \u05EA\u05E0\u05D0\u05D9 \u05D4\u05E4\u05E8\u05DB\u05D4 \u05DB\u05EA\u05D5\u05D1 \u05DE\u05E8\u05D0\u05E9 \u2014 \u05D5\u05DB\u05E9\u05D4\u05D5\u05D0 \u05DE\u05EA\u05E7\u05D9\u05D9\u05DD, \u05D0\u05EA\u05D4 \u05D9\u05D5\u05E6\u05D0 \u05D1\u05DC\u05D9 \u05D3\u05D9\u05D5\u05DF.","\u201ESure\u201D against contradicting data is stubbornness, not confidence. Give the thesis a written invalidation condition in advance \u2014 and when it is met, you exit without debate.")},{label:r("\u05DC\u05D0 \u05D4\u05E8\u05D2\u05E9\u05EA\u05D9 \u05E9\u05D6\u05D4 \u05E0\u05E9\u05D1\u05E8","I did not feel it broke"),reply:r("\u05D0\u05D6 \u05D0\u05D5\u05DC\u05D9 \u05D6\u05D5 \u05DC\u05D0 \u05D2\u05DE\u05D9\u05E9\u05D5\u05EA \u05D0\u05DC\u05D0 \u05D4\u05D2\u05D3\u05E8\u05D4: \u05D1\u05DC\u05D9 \u05EA\u05E0\u05D0\u05D9 \u05D1\u05E8\u05D5\u05E8 \u05E9\u05D0\u05D5\u05DE\u05E8 \u201E\u05D4\u05EA\u05D6\u05D4 \u05DE\u05EA\u05D4\u201D, \u05EA\u05DE\u05D9\u05D3 \u05EA\u05DE\u05E6\u05D0 \u05E1\u05D9\u05D1\u05D4 \u05DC\u05D4\u05D9\u05E9\u05D0\u05E8. \u05D4\u05D2\u05D3\u05E8 \u05D0\u05D5\u05EA\u05D5 \u05DE\u05E8\u05D0\u05E9.","Then maybe it is not flexibility but definition: without a clear condition that says \u201Ethe thesis is dead,\u201D you will always find a reason to stay. Define it in advance.")}]},confidence:{ask:r("\u05D4\u05D1\u05D9\u05D8\u05D7\u05D5\u05DF \u05E9\u05DC\u05DA \u05E0\u05E8\u05D0\u05D4 \u05E0\u05E9\u05E2\u05DF \u05D9\u05D5\u05EA\u05E8 \u05E2\u05DC \u05EA\u05D7\u05D5\u05E9\u05D4 \u05DE\u05D0\u05E9\u05E8 \u05E2\u05DC \u05D1\u05D3\u05D9\u05E7\u05D4. \u05DE\u05D0\u05D9\u05E4\u05D4 \u05DE\u05D2\u05D9\u05E2 \u05D4\u05D1\u05D9\u05D8\u05D7\u05D5\u05DF \u05E9\u05DC\u05DA \u05D1\u05E2\u05E1\u05E7\u05D4?","Your confidence seems to lean more on feeling than on checking. Where does your confidence in a trade come from?"),options:[{label:r("\u05DE\u05EA\u05D7\u05D5\u05E9\u05EA \u05D1\u05D8\u05DF, \u05D0\u05E0\u05D9 \u05D9\u05D5\u05D3\u05E2","From a gut feeling, I just know"),reply:r("\u05EA\u05D7\u05D5\u05E9\u05EA \u05D1\u05D8\u05DF \u05D4\u05D9\u05D0 \u05DC\u05E4\u05E2\u05DE\u05D9\u05DD \u05E0\u05D9\u05E1\u05D9\u05D5\u05DF \u05DE\u05D6\u05D5\u05E7\u05E7, \u05D5\u05DC\u05E4\u05E2\u05DE\u05D9\u05DD \u05E8\u05E2\u05E9. \u05D4\u05D4\u05D1\u05D3\u05DC: \u05D4\u05D0\u05DD \u05D0\u05EA\u05D4 \u05D9\u05DB\u05D5\u05DC \u05DC\u05D4\u05E8\u05D0\u05D5\u05EA \u05D0\u05D5\u05EA\u05D4 \u05E2\u05DC 50 \u05E2\u05E1\u05E7\u05D0\u05D5\u05EA \u05E2\u05D1\u05E8? \u05D0\u05DD \u05DB\u05DF \u2014 \u05D6\u05D4 edge. \u05D0\u05DD \u05DC\u05D0 \u2014 \u05D4\u05D9\u05DE\u05D5\u05E8.","A gut feeling is sometimes distilled experience, and sometimes noise. The difference: can you show it over 50 past trades? If yes \u2014 it is an edge. If not \u2014 a gamble.")},{label:r("\u05DE\u05D4\u05E0\u05D9\u05E1\u05D9\u05D5\u05DF \u05E9\u05DC\u05D9","From my experience"),reply:r("\u05E0\u05D9\u05E1\u05D9\u05D5\u05DF \u05D4\u05D5\u05D0 \u05E0\u05DB\u05E1, \u05D0\u05D1\u05DC \u05D2\u05DD \u05DE\u05DC\u05DB\u05D5\u05D3\u05EA \u2014 \u05D4\u05E9\u05D5\u05E7 \u05DE\u05E9\u05EA\u05E0\u05D4. \u05D5\u05D3\u05D0 \u05E9\u05D4\u05D1\u05D9\u05D8\u05D7\u05D5\u05DF \u05E9\u05DC\u05DA \u05DE\u05D1\u05D5\u05E1\u05E1 \u05E2\u05DC \u05DE\u05D4 \u05E9\u05E2\u05D5\u05D1\u05D3 \u05E2\u05DB\u05E9\u05D9\u05D5, \u05DC\u05D0 \u05E2\u05DC \u05DE\u05D4 \u05E9\u05E2\u05D1\u05D3 \u05E4\u05E2\u05DD.","Experience is an asset, but also a trap \u2014 the market changes. Make sure your confidence is based on what works now, not on what worked once.")},{label:r("\u05DE\u05D1\u05D3\u05D9\u05E7\u05D4 \u05D0\u05DE\u05D9\u05EA\u05D9\u05EA \u05E9\u05DC \u05E0\u05EA\u05D5\u05E0\u05D9\u05DD","From a real check of the data"),reply:r("\u05D0\u05DD \u05D1\u05D0\u05DE\u05EA \u05DB\u05DB\u05D4 \u2014 \u05D6\u05D4 \u05D4\u05D1\u05D9\u05D8\u05D7\u05D5\u05DF \u05D4\u05D1\u05E8\u05D9\u05D0. \u05E8\u05E7 \u05E9\u05D9\u05DD \u05DC\u05D1 \u05E9\u05D4\u05DE\u05D3\u05D9\u05D3\u05D4 \u05DB\u05D0\u05DF \u05E8\u05DE\u05D6\u05D4 \u05D0\u05D7\u05E u05E9 \u05E7\u05E8. \u05D6\u05D5 \u05D1\u05D3\u05D9\u05D5\u05E7 \u05D4\u05EA\u05DB\u05D5\u05E0\u05D4 \u05E9\u05EA\u05D4\u05E4\u05D5\u05DA \u05D0\u05EA \u05D4\u05DE\u05E1\u05D7\u05E8 \u05DC\u05D3\u05DC\u05EA \u05D9\u05E6\u05D9\u05D0\u05D4 \u05D0\u05DE\u05D9\u05EA\u05D9\u05EA \u05D5\u05DC\u05D0 \u05DC\u05DE\u05DC\u05DB\u05D5\u05D3\u05EA.","You came to escape something, yet you kept a cool head. That is exactly the trait that turns trading into a real exit door rather than a trap."):r("\u05D1\u05D0\u05EA \u05DC\u05D1\u05E8\u05D5\u05D7 \u05DE\u05E2\u05D1\u05D5\u05D3\u05D4 \u05E9\u05D0\u05EA\u05D4 \u05E9\u05D5\u05E0\u05D0, \u05D5\u05D6\u05D4 \u05D4\u05D5\u05E4\u05DA \u05DB\u05DC \u05D4\u05E4\u05E1\u05D3 \u05DC\u05DC\u05D7\u05E5 \u05DB\u05E4\u05D5\u05DC. \u05D4\u05DC\u05D7\u05E5 \u05D4\u05D6\u05D4 \u05DB\u05D1\u05E8 \u05E0\u05D9\u05DB\u05E8 \u05D0\u05E6\u05DC\u05DA \u2014 \u05D5\u05D4\u05D5\u05D0 \u05DE\u05D4 \u05E9\u05DE\u05D5\u05D1\u05D9\u05DC \u05DC\u05D4\u05D7\u05DC\u05D8\u05D5\u05EA \u05E4\u05D6\u05D9\u05D6\u05D5\u05EA. \u05DB\u05D3\u05D9 \u05E9\u05D6\u05D4 \u05D9\u05E2\u05D1\u05D5\u05D3 \u05D0\u05EA\u05D4 \u05E6\u05E8\u05D9\u05DA \u05D2\u05D1 \u05DB\u05DC\u05DB\u05DC\u05D9 \u05E9\u05DE\u05D5\u05E8\u05D9\u05D3 \u05D0\u05EA \u05D4\u05DC\u05D7\u05E5, \u05D0\u05D7\u05E8\u05EA \u05D4\u05E9\u05D5\u05E7 \u05D9\u05E8\u05D2\u05D9\u05E9 \u05D0\u05EA \u05D4\u05D9\u05D9\u05D0\u05D5\u05E9.","You came to escape a job you hate, and that turns every loss into double the pressure. That pressure already shows in you \u2014 and it leads to rash decisions. For this to work you need a financial cushion that lowers the pressure, otherwise the market will sense the desperation."):s==="freedom"?m=n?r("\u05D0\u05EA\u05D4 \u05E8\u05D5\u05E6\u05D4 \u05D7\u05D5\u05E4\u05E9 \u2014 \u05D0\u05D1\u05DC \u05D1\u05E9\u05D5\u05E7 \u05D4\u05D7\u05D5\u05E4\u05E9 \u05E0\u05D1\u05E0\u05D4 \u05D3\u05D5\u05D5\u05E7\u05D0 \u05DE\u05DE\u05E9\u05DE\u05E2\u05EA \u05D1\u05E8\u05D6\u05DC. \u05DB\u05DB\u05DC \u05E9\u05D4\u05DB\u05DC\u05DC\u05D9\u05DD \u05E9\u05DC\u05DA \u05E0\u05D5\u05E7\u05E9\u05D9\u05DD \u05D9\u05D5\u05EA\u05E8, \u05D0\u05EA\u05D4 \u05D7\u05D5\u05E4\u05E9\u05D9 \u05D9\u05D5\u05EA\u05E8 \u05DE\u05D4\u05E8\u05D2\u05E9 \u05E9\u05DE\u05E0\u05D4\u05DC \u05D0\u05D5\u05EA\u05DA. \u05DB\u05E8\u05D2\u05E2 \u05D4\u05DE\u05E9\u05DE\u05E2\u05EA \u05D4\u05D9\u05D0 \u05DE\u05D4 \u05E9\u05E2\u05D5\u05DE\u05D3 \u05D1\u05D9\u05E0\u05DA \u05DC\u05D1\u05D9\u05DF \u05D4\u05D7\u05D5\u05E4\u05E9 \u05D4\u05D6\u05D4.","You want freedom \u2014 but in the market freedom is built precisely from iron discipline. The stricter your rules, the freer you are from the emotion that runs you. Right now discipline is what stands between you and that freedom."):r("\u05D0\u05EA\u05D4 \u05E8\u05D5\u05E6\u05D4 \u05D7\u05D5\u05E4\u05E9, \u05D5\u05DB\u05D1\u05E8 \u05D1\u05E0\u05D9\u05EA \u05D0\u05EA \u05D4\u05DE\u05E9\u05DE\u05E2\u05EA \u05E9\u05DE\u05D9\u05D9\u05E6\u05E8\u05EA \u05D0\u05D5\u05EA\u05D5. \u05D6\u05D4 \u05D4\u05E9\u05D9\u05DC\u05D5\u05D1 \u05D4\u05E0\u05DB\u05D5\u05DF \u2014 \u05EA\u05E9\u05DE\u05D5\u05E8 \u05E2\u05DC\u05D9\u05D5.","You want freedom, and you have already built the discipline that creates it. That is the right combination \u2014 protect it."):s==="challenge"?m=r("\u05D0\u05EA\u05D4 \u05DB\u05D0\u05DF \u05D1\u05E9\u05D1\u05D9\u05DC \u05D4\u05D0\u05EA\u05D2\u05E8, \u05D5\u05D6\u05D5 \u05E1\u05E7\u05E8\u05E0\u05D5\u05EA \u05E9\u05DE\u05D7\u05D6\u05D9\u05E7\u05D4 \u05DC\u05D0\u05D5\u05E8\u05DA \u05D6\u05DE\u05DF. \u05D4\u05E1\u05DB\u05E0\u05D4 \u05E9\u05DC\u05DA \u05D4\u05E4\u05D5\u05DB\u05D4: \u05DC\u05D4\u05E4\u05D5\u05DA \u05E4\u05E9\u05D8\u05D5\u05EA \u05DC\u05DE\u05D5\u05E8\u05DB\u05D1\u05D5\u05EA \u05E8\u05E7 \u05DB\u05D9 \u05D6\u05D4 \u05DE\u05E2\u05E0\u05D9\u05D9\u05DF. \u05D4\u05E9\u05D0\u05DC\u05D4 \u05D4\u05D9\u05D0 \u05DC\u05D0 \u05DB\u05DE\u05D4 \u05D7\u05DB\u05DE\u05D4 \u05D4\u05E9\u05D9\u05D8\u05D4, \u05D0\u05DC\u05D0 \u05DB\u05DE\u05D4 \u05E2\u05E7\u05D1\u05D9 \u05D0\u05EA\u05D4 \u05D0\u05D9\u05EA\u05D4.","You are here for the challenge, and that is a curiosity that lasts. Your danger is the opposite: turning simplicity into complexity just because it is interesting. The question is not how clever the method is, but how consistent you are with it."):d==="income"?m=n?r("\u05D0\u05EA\u05D4 \u05E8\u05D5\u05E6\u05D4 \u05D4\u05DB\u05E0\u05E1\u05D4 \u05D7\u05D5\u05D3\u05E9\u05D9\u05EA \u05D9\u05E6\u05D9\u05D1\u05D4 \u2014 \u05D0\u05D1\u05DC \u05E8\u05DE\u05EA \u05D4\u05E1\u05D9\u05DB\u05D5\u05DF \u05E9\u05D0\u05EA\u05D4 \u05DC\u05D5\u05E7\u05D7 \u05DE\u05D9\u05D9\u05E6\u05E8\u05EA \u05D1\u05D3\u05D9\u05D5\u05E7 \u05D0\u05EA \u05D4\u05EA\u05E0\u05D5\u05D3\u05EA\u05D9\u05D5\u05EA \u05E9\u05D4\u05D5\u05E8\u05E1\u05EA \u05D9\u05E6\u05D9\u05D1\u05D5\u05EA. \u05D4\u05DB\u05E0\u05E1\u05D4 \u05D9\u05E6\u05D9\u05D1\u05D4 \u05DC\u05D0 \u05D1\u05D0\u05D4 \u05DE\u05E2\u05E1\u05E7\u05D0\u05D5\u05EA \u05D2\u05D3\u05D5\u05DC\u05D5\u05EA, \u05D0\u05DC\u05D0 \u05DE\u05E1\u05D9\u05DB\u05D5\u05DF \u05E7\u05D8\u05DF, \u05E2\u05E7\u05D1\u05D9, \u05D5\u05DE\u05E9\u05E2\u05DE\u05DD.","You want steady monthly income \u2014 but the risk level you take creates exactly the volatility that destroys stability. Steady income does not come from big trades, but from small, consistent, boring risk."):r("\u05D0\u05EA\u05D4 \u05E8\u05D5\u05E6\u05D4 \u05D4\u05DB\u05E0\u05E1\u05D4 \u05D9\u05E6\u05D9\u05D1\u05D4, \u05D5\u05D4\u05D4\u05EA\u05E0\u05D4\u05D2\u05D5\u05EA \u05E9\u05DC\u05DA \u05EA\u05D5\u05DE\u05DB\u05EA \u05D1\u05D6\u05D4 \u2014 \u05E1\u05D9\u05DB\u05D5\u05DF \u05DE\u05E8\u05D5\u05E1\u05DF \u05D5\u05E2\u05E7\u05D1\u05D9\u05D5\u05EA. \u05D6\u05D4 \u05D1\u05D3\u05D9\u05D5\u05E7 \u05D4\u05DE\u05EA\u05DB\u05D5\u05DF.","You want steady income, and your behavior supports it \u2014 restrained risk and consistency. That is exactly the recipe."):d==="prove"?m=r("\u05D1\u05D0\u05EA \u05DC\u05D4\u05D5\u05DB\u05D9\u05D7 \u05DC\u05E2\u05E6\u05DE\u05DA \u05DE\u05E9\u05D4\u05D5. \u05EA\u05D9\u05D6\u05D4\u05E8 \u05DE\u05D4\u05DE\u05DC\u05DB\u05D5\u05D3\u05EA: \u05DB\u05E9\u05DE\u05E1\u05D7\u05E8 \u05D4\u05D5\u05E4\u05DA \u05DC\u05D4\u05D5\u05DB\u05D7\u05D4, \u05DB\u05DC \u05E2\u05E1\u05E7\u05D4 \u05E0\u05D4\u05D9\u05D9\u05EA \u05D0\u05D2\u05D5, \u05D5\u05E7\u05E9\u05D4 \u05DC\u05E6\u05D0\u05EA \u05DE\u05DE\u05E4\u05E1\u05D9\u05D3\u05D4 \u05DB\u05D9 \u05D6\u05D4 \u05DE\u05E8\u05D2\u05D9\u05E9 \u05DB\u05DE\u05D5 \u201E\u05DC\u05D4\u05D5\u05D3\u05D5\u05EA \u05D1\u05EA\u05D1\u05D5\u05E1\u05D4\u201D. \u05D4\u05D4\u05D5\u05DB\u05D7\u05D4 \u05D4\u05D0\u05DE\u05D9\u05EA\u05D9\u05EA \u05D4\u05D9\u05D0 \u05DC\u05D0 \u05E2\u05E1\u05E7\u05D4 \u05DE\u05E0\u05E6\u05D7\u05EA \u05D0\u05D7\u05EA \u2014 \u05D4\u05D9\u05D0 \u05E2\u05E7\u05D1\u05D9\u05D5\u05EA, \u05D7\u05D5\u05D3\u05E9 \u05D0\u05D7\u05E8\u05D9 \u05D7\u05D5\u05D3\u05E9.","You came to prove something to yourself. Beware the trap: when trading becomes proof, every trade becomes ego, and it is hard to exit a loser because it feels like \u201Eadmitting defeat.\u201D The real proof is not one winning trade \u2014 it is consistency, month after month."):m=n?r("\u05D4\u05DE\u05D8\u05E8\u05D4 \u05E9\u05D4\u05E6\u05D1\u05EA \u05DC\u05E2\u05E6\u05DE\u05DA \u05D3\u05D5\u05E8\u05E9\u05EA \u05E1\u05D1\u05DC\u05E0\u05D5\u05EA \u05D5\u05E8\u05D9\u05E1\u05D5\u05DF \u2014 \u05D5\u05D1\u05D3\u05D9\u05D5\u05E7 \u05E9\u05DD \u05E0\u05DE\u05E6\u05D0\u05EA \u05D4\u05D7\u05D5\u05DC\u05E9\u05D4 \u05E9\u05E2\u05DC\u05EA\u05D4 \u05D0\u05E6\u05DC\u05DA. \u05D4\u05E4\u05E2\u05E8 \u05D1\u05D9\u05DF \u05D4\u05D9\u05E2\u05D3 \u05DC\u05D3\u05E8\u05DA \u05D4\u05D5\u05D0 \u05DE\u05D4 \u05E9\u05DB\u05D3\u05D0\u05D9 \u05DC\u05E1\u05D2\u05D5\u05E8 \u05E7\u05D5\u05D3\u05DD.","The goal you set yourself demands patience and restraint \u2014 and that is exactly where the weakness that showed up lies. The gap between the target and the route is what is worth closing first."):r("\u05D4\u05DE\u05D8\u05E8\u05D4 \u05E9\u 5DD, \u05D0\u05D1\u05DC \u05DC\u05D0 \u05D1\u05D0\u05D5\u05E4\u05DF \u05E2\u05E7\u05D1\u05D9. \u05DB\u05DC \u05E9\u05D9\u05D8\u05D4 \u05D7\u05D3\u05E9\u05D4 \u05E9\u05D5\u05D5\u05D4 \u05E8\u05D9\u05E6\u05D4 \u05E2\u05DC 50\u2013100 \u05E2\u05E1\u05E7\u05D0\u05D5\u05EA \u05E2\u05D1\u05E8 \u05DC\u05E4\u05E0\u05D9 \u05DB\u05E1\u05E3 \u05D0\u05DE\u05D9\u05EA\u05D9 \u2014 \u05D0\u05D7\u05E8\u05EA \u05D0\u05EA\u05D4 \u05DE\u05E9\u05DC\u05DD \u05E9\u05DB\u05E8 \u05DC\u05D9\u05DE\u05D5\u05D3 \u05DE\u05D9\u05D5\u05EA\u05E8.","You test sometimes, but not consistently. Every new method deserves a run over 50\u2013100 past trades before real money \u2014 otherwise you pay unnecessary tuition."),bad:r("\u05D0\u05EA\u05D4 \u05DE\u05E1\u05DB\u05DF \u05DB\u05E1\u05E3 \u05E2\u05DC \u05E9\u05D9\u05D8\u05D5\u05EA \u05E9\u05DC\u05D0 \u05E0\u05D1\u05D3\u05E7\u05D5 \u05E2\u05DC \u05D4\u05E2\u05D1\u05E8. \u05E7\u05D7 \u05E9\u05D9\u05D8\u05D4 \u05D0\u05D7\u05EA, \u05D4\u05E8\u05E5 \u05D0\u05D5\u05EA\u05D4 \u05E2\u05DC 50 \u05E2\u05E1\u05E7\u05D0\u05D5\u05EA \u05D4\u05D9\u05E1\u05D8\u05D5\u05E8\u05D9\u05D5\u05EA, \u05D5\u05E8\u05D0\u05D4 \u05D0\u05DD \u05D9\u05E9 \u05DC\u05D4 \u05EA\u05D5\u05D7\u05DC\u05EA \u05D7\u05D9\u05D5\u05D1\u05D9\u05EA \u2014 \u05DC\u05E4\u05E0\u05D9 \u05E9\u05E7\u05DC \u05D0\u05D7\u05D3 \u05E0\u05DB\u05E0\u05E1.","You risk money on methods never tested on the past. Take one method, run it on 50 historical trades, and see if it has positive expectancy \u2014 before a single cent goes in."),neutral:r("\u05DC\u05D0 \u05E9\u05D0\u05DC\u05E0\u05D5 \u05E2\u05DC \u05D6\u05D4 \u05D9\u05E9\u05D9\u05E8\u05D5\u05EA \u05D1\u05D2\u05E8\u05E1\u05D4 \u05E9\u05DC\u05DA, \u05D0\u05D1\u05DC \u05D6\u05D4 \u05E7\u05E8\u05D9\u05D8\u05D9: \u05D1\u05D0\u05E7\u05D8\u05E1\u05D8 \u05D4\u05D5\u05D0 \u05D4\u05D4\u05D1\u05D3\u05DC \u05D1\u05D9\u05DF \u201E\u05E0\u05E8\u05D0\u05D4 \u05DC\u05D9 \u05E9\u05D6\u05D4 \u05E2\u05D5\u05D1\u05D3\u201D \u05DC\u201E\u05D0\u05E0\u05D9 \u05D9\u05D5\u05D3\u05E2 \u05E9\u05D6\u05D4 \u05E2\u05D5\u05D1\u05D3\u201D. \u05E9\u05D5\u05D5\u05D4 \u05DC\u05D4\u05EA\u05D7\u05D9\u05DC \u05DE\u05DC\u05D1\u05D3\u05D5\u05E7 \u05E9\u05D9\u05D8\u05D4 \u05D0\u05D7\u05EA \u05E2\u05DC \u05E0\u05EA\u05D5\u05E0\u05D9 \u05E2\u05D1\u05E8.","We did not ask about this directly in your version, but it is critical: backtesting is the difference between \u201EI think it works\u201D and \u201EI know it works.\u201D Worth starting by testing one method on past data.")},routine:{good:r("\u05D9\u05E9 \u05DC\u05DA \u05E9\u05D2\u05E8\u05D4 \u05E7\u05D1\u05D5\u05E2\u05D4 \u05DC\u05E4\u05E0\u05D9 \u05D4\u05DE\u05E1\u05D7\u05E8 \u2014 \u05E6\u05F3\u05E7\u05DC\u05D9\u05E1\u05D8 \u05E9\u05D7\u05D5\u05D6\u05E8 \u05E2\u05DC \u05E2\u05E6\u05DE\u05D5. \u05D6\u05D4 \u05D1\u05D3\u05D9\u05D5\u05E7 \u05DE\u05D4 \u05E9\u05DE\u05D5\u05E8\u05D9\u05D3 \u05D4\u05D7\u05DC\u05D8\u05D5\u05EA \u05D0\u05D9\u05DE\u05E4\u05D5\u05DC\u05E1\u05D9\u05D1\u05D9\u05D5\u05EA. \u05E9\u05DE\u05D5\u05E8 \u05E2\u05DC\u05D9\u05D5 \u05DB\u05DE\u05D5 \u05E2\u05DC \u05E0\u05DB\u05E1.","You have a fixed pre-trading routine \u2014 a checklist that repeats. That is exactly what cuts impulsive decisions. Guard it like an asset."),warn:r("\u05D9\u05E9 \u05DC\u05DA \u05D7\u05E6\u05D9-\u05E9\u05D2\u05E8\u05D4. \u05D4\u05E4\u05D5\u05DA \u05D0\u05D5\u05EA\u05D4 \u05DC\u05E7\u05D1\u05D5\u05E2\u05D4: \u05D0\u05D5\u05EA\u05D5 \u05E6\u05F3\u05E7\u05DC\u05D9\u05E1\u05D8 \u05E7\u05E6\u05E8, \u05D0\u05D5\u05EA\u05D5 \u05E1\u05D3\u05E8, \u05DB\u05DC \u05D9\u05D5\u05DD. \u05E2\u05E7\u05D1\u05D9\u05D5\u05EA \u05D1\u05EA\u05D4\u05DC\u05D9\u05DA \u05D4\u05D9\u05D0 \u05DE\u05D4 \u05E9\u05DE\u05D1\u05D9\u05D0 \u05E2\u05E7\u05D1\u05D9\u05D5\u05EA \u05D1\u05EA\u05D5\u05E6\u05D0\u05D4.","You have a half-routine. Make it fixed: the same short checklist, the same order, every day. Consistency in process is what brings consistency in results."),bad:r("\u05D0\u05EA\u05D4 \u05E0\u05DB\u05E0\u05E1 \u05DC\u05DE\u05E1\u05D7\u05E8 \u05D1\u05DC\u05D9 \u05E9\u05D2\u05E8\u05D4 \u05E7\u05D1\u05D5\u05E2\u05D4, \u05D5\u05D6\u05D4 \u05DE\u05E9\u05D0\u05D9\u05E8 \u05D0\u05D5\u05EA\u05DA \u05E4\u05EA\u05D5\u05D7 \u05DC\u05DE\u05E6\u05D1 \u05D4\u05E8\u05D5\u05D7 \u05E9\u05DC \u05D4\u05E8\u05D2\u05E2. \u05E6\u05F3\u05E7\u05DC\u05D9\u05E1\u05D8 \u05E9\u05DC \u05D7\u05DE\u05E9 \u05E9\u05D5\u05E8\u05D5\u05EA \u05DC\u05E4\u05E0\u05D9 \u05D4\u05E2\u05E1\u05E7\u05D4 \u05D4\u05E8\u05D0\u05E9\u05D5\u05E0\u05D4 \u05DC\u05D1\u05D3 \u05D9\u05E9\u05E0\u05D4 \u05DC\u05DA \u05D0\u05EA \u05D4\u05D9\u05D5\u05DD.","You enter trading with no fixed routine, which leaves you open to the mood of the moment. A five-line checklist before the first trade alone will change your day."),neutral:r("\u05DC\u05D0 \u05E0\u05DE\u05D3\u05D3 \u05D9\u05E9\u05D9\u05E8\u05D5\u05EA \u05D0\u05E6\u05DC\u05DA, \u05D0\u05D1\u05DC \u05E9\u05D2\u05E8\u05D4 \u05DC\u05E4\u05E0\u05D9 \u05DE\u05E1\u05D7\u05E8 \u05D4\u05D9\u05D0 \u05DE\u05D4 \u05E9\u05DE\u05DB\u05E0\u05D9\u05E1 \u05D0\u05D5\u05EA\u05DA \u05DC\u201E\u05DE\u05E6\u05D1 \u05E1\u05D5\u05D7\u05E8\u201D \u05D1\u05DE\u05E7\u05D5\u05DD \u201E\u05DE\u05E6\u05D1 \u05DE\u05D2\u05D9\u05D1\u201D. \u05E9\u05D5\u05D5\u05D4 \u05E6\u05F3\u05E7\u05DC\u05D9\u05E1\u05D8 \u05E7\u05E6\u05E8 \u05D5\u05E7\u05D1\u05D5\u05E2 \u05DC\u05E4\u05E0\u05D9 \u05E9\u05D0\u05EA\u05D4 \u05E0\u05D5\u05D2\u05E2 \u05D1\u05DB\u05E4\u05EA\u05D5\u05E8.","Not measured directly for you, but a pre-trading routine is what puts you in \u201Etrader mode\u201D rather than \u201Ereactive mode.\u201D Worth a short, fixed checklist before you touch a button.")},sleep:{good:r("\u05D4\u05E9\u05D9\u05E0\u05D4 \u05E9\u05DC\u05DA \u05D9\u05E6\u05D9\u05D1\u05D4 \u05D2\u05DD \u05D1\u05EA\u05E7\u05D5\u05E4\u05D5\u05EA \u05DC\u05D7\u05E5 \u2014 \u05D5\u05D6\u05D4 \u05DE\u05EA\u05D5\u05E8\u05D2\u05DD \u05D9\u05E9\u05D9\u05E8\u05D5\u05EA \u05DC\u05D4\u05D7\u05DC\u05D8\u05D5\u05EA \u05E0\u05E7\u05D9\u05D5\u05EA. \u05D0\u05DC \u05EA\u05D6\u05DC\u05
